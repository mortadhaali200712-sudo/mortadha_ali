<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التقديم على السيرفر | مرتضى علي</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; margin: 0; }
        
        /* زر الرجوع العائم والأنيق */
        .back-btn { 
            position: fixed; top: 20px; left: 20px; background: linear-gradient(45deg, #4caf50, #2e7d32); 
            color: white; padding: 12px 25px; border-radius: 30px; text-decoration: none; font-weight: bold; 
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3); transition: 0.3s; z-index: 1000;
        }
        .back-btn:hover { transform: scale(1.05); }

        .section-box { 
            background: #121212; border: 1px solid #4caf50; padding: 30px; 
            border-radius: 25px; margin: 50px auto; width: 90%; max-width: 700px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        h1 { color: #4caf50; margin-bottom: 10px; }
        
        .ticket-input { 
            width: 80%; padding: 12px; border-radius: 10px; border: 1px solid #4caf50; 
            background: #222; color: white; margin-bottom: 15px; text-align: center;
        }
        .btn-main { 
            background: #ff9800; color: white; padding: 12px 30px; border: none; 
            border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-main:hover { background: #e68900; }
        
        iframe { border-radius: 15px; border: 2px solid #333; margin-top: 20px; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← عودة للرئيسية</a>

    <div class="section-box">
        <h1>التقديم على السيرفر 🛡️</h1>
        <p>املأ نموذج الانضمام أدناه بدقة:</p>
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSegRLmefcrIzVP6Az9vrhC1PP1M42i7LWDnIXLfy0l2VLrQfQ/viewform?embedded=true" 
                width="100%" height="600px" frameborder="0">جارٍ التحميل…</iframe>
    </div>

    <div class="section-box" style="border-color: #ff9800;">
        <h2 style="color: #ff9800;">هل لديك استفسار؟ 💬</h2>
        <input type="text" id="username" class="ticket-input" placeholder="اكتب اسمك هنا...">
        <br>
        <button class="btn-main" onclick="createTicket()">➕ فتح تكت خاص</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCeuQF67GtK8JWBAEo9zKHM-RxLVeAhgcs",
            authDomain: "murtadaserver-bbe52.firebaseapp.com",
            databaseURL: "https://murtadaserver-bbe52-default-rtdb.firebaseio.com",
            projectId: "murtadaserver-bbe52",
            storageBucket: "murtadaserver-bbe52.firebasestorage.app",
            messagingSenderId: "816833804949",
            appId: "1:816833804949:web:c4793ec95fa69ea44c399c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function createTicket() {
            const name = document.getElementById('username').value;
            if (!name) { alert("يرجى كتابة اسمك أولاً!"); return; }
            const newTicket = db.ref('tickets/').push({ user: name, status: 'open' });
            window.location.href = "ticket.html?id=" + newTicket.key + "&name=" + encodeURIComponent(name);
        }
    </script>
</body>
</html>
