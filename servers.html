<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سيرفرات مرتضى علي</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .admin-btn { position: fixed; top: 10px; right: 10px; background: #333; border: 1px solid #4caf50; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; z-index: 1000; }
        .menu-box, .panel-box { background: #1a1a1a; border: 2px solid #4caf50; padding: 20px; border-radius: 15px; margin: 20px auto; width: 90%; max-width: 500px; display: none; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex-grow: 1; padding: 10px; border-radius: 5px; border: 1px solid #555; background: #333; color: white; }
        button { cursor: pointer; border: none; padding: 10px; border-radius: 5px; margin: 5px; }
        .server-card { background: #222; border: 1px solid #4caf50; padding: 15px; margin: 15px auto; border-radius: 10px; width: 90%; max-width: 500px; text-align: right; position: relative; }
        .checkbox { position: absolute; left: 15px; top: 15px; width: 20px; height: 20px; display: none; }
    </style>
</head>
<body>

    <button class="admin-btn" onclick="openMenu()">⚙️ إعدادات</button>

    <div id="menuBox" class="menu-box">
        <button onclick="showPanel('add')" style="background:#4caf50; color:white;">➕ إضافة سيرفر</button>
        <button onclick="showPanel('del')" style="background:#ff4d4d; color:white;">🗑️ حذف سيرفر</button>
    </div>

    <div id="addPanel" class="panel-box">
        <input type="text" id="sName" placeholder="اسم السيرفر" style="width:90%"><br><br>
        <input type="text" id="sIp" placeholder="الايبي" style="width:90%"><br><br>
        <input type="text" id="sPort" placeholder="البورت" style="width:90%"><br><br>
        <button onclick="saveServer()" style="background:#4caf50; color:white; width:95%">حفظ ونشر</button>
    </div>

    <div id="delPanel" class="panel-box">
        <p>حدد السيرفرات التي تريد حذفها:</p>
        <button onclick="deleteSelected()" style="background:#ff4d4d; color:white; width:95%">حذف المحدد</button>
    </div>

    <h1>السيرفرات</h1>
    <div id="serverList"></div>

    <script>
        document.getElementById('serverList').innerHTML = localStorage.getItem('myServers') || "";

        function openMenu() {
            const pass = prompt("أدخل كلمة المرور:");
            if(pass === "20077412") { document.getElementById('menuBox').style.display = "block"; }
            else { alert("خطأ!"); }
        }

        function showPanel(type) {
            document.getElementById('menuBox').style.display = "none";
            if(type === 'add') document.getElementById('addPanel').style.display = "block";
            else {
                document.getElementById('delPanel').style.display = "block";
                document.querySelectorAll('.checkbox').forEach(c => c.style.display = "block");
            }
        }

        function saveServer() {
            const card = `
                <div class="server-card">
                    <input type="checkbox" class="checkbox">
                    <h3 style="color:#4caf50; margin:0;">${document.getElementById('sName').value}</h3>
                    <p>الايبي: ${document.getElementById('sIp').value}</p>
                    <p>البورت: ${document.getElementById('sPort').value}</p>
                </div>`;
            document.getElementById('serverList').innerHTML += card;
            localStorage.setItem('myServers', document.getElementById('serverList').innerHTML);
            location.reload();
        }

        function deleteSelected() {
            document.querySelectorAll('.checkbox:checked').forEach(c => c.parentElement.remove());
            localStorage.setItem('myServers', document.getElementById('serverList').innerHTML);
            location.reload();
        }
    </script>
</body>
</html>
