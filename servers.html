<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سيرفرات مرتضى علي</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; margin: 0; min-height: 100vh; }
        #chat-sidebar { width: 300px; background: #1a1a1a; border-left: 2px solid #4caf50; padding: 10px; }
        #main-content { flex: 1; padding: 20px; text-align: center; }
        input { width: 90%; padding: 10px; margin-bottom: 5px; background: #333; border: 1px solid #555; color: white; border-radius: 5px; }
        button { cursor: pointer; padding: 10px; border: none; border-radius: 5px; margin: 5px; font-weight: bold; background: #4caf50; color: white; }
        .server-card { background: #222; border: 1px solid #4caf50; padding: 15px; margin: 15px auto; width: 80%; border-radius: 10px; text-align: right; }
    </style>
</head>
<body>

    <div id="chat-sidebar">
        <h3>تسجيل الدخول</h3>
        <input type="text" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="loginEmail()" style="width:95%">دخول / إنشاء حساب</button>
        <div id="chatBox" style="margin-top:20px; font-size:12px;"></div>
    </div>

    <div id="main-content">
        <h1>قائمة السيرفرات</h1>
        <button onclick="openMenu()">⚙️ إعدادات</button>
        <div id="serverList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyCdWY5KWaRDqfkQhIuGfBjHShYKiKAalsY", 
            authDomain: "mychatapp-87d3e.firebaseapp.com",
            projectId: "mychatapp-87d3e",
            storageBucket: "mychatapp-87d3e.appspot.com",
            messagingSenderId: "367201625906",
            appId: "1:367201625906:web:d261e43485c29a8a"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.loginEmail = () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, password)
            .then(() => alert("تم الدخول!"))
            .catch(() => {
                createUserWithEmailAndPassword(auth, email, password)
                .then(() => alert("تم إنشاء الحساب!"))
                .catch(err => alert("خطأ: " + err.message));
            });
        };
    </script>

    <script>
        document.getElementById('serverList').innerHTML = localStorage.getItem('myServers_v3') || "";
        function openMenu() { if(prompt("كلمة المرور:") === "20077412") { /* أضف كود فتح القائمة هنا */ alert("تم التحقق!"); } }
    </script>
</body>
</html>
