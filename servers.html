<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سيرفرات مرتضى علي</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .back-home { position: fixed; top: 10px; left: 10px; background: #444; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; border: 1px solid #4caf50; font-weight: bold; }
        .admin-btn { position: fixed; top: 10px; right: 10px; background: #333; border: 1px solid #4caf50; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .panel-box { background: #1a1a1a; border: 2px solid #4caf50; padding: 20px; border-radius: 15px; margin: 20px auto; width: 90%; max-width: 500px; display: none; }
        .visible { display: block !important; }
        input { width: 90%; padding: 10px; margin-bottom: 10px; background: #333; color: white; border: 1px solid #555; border-radius: 5px; }
        button { cursor: pointer; padding: 10px; border: none; border-radius: 5px; margin: 5px; font-weight: bold; }
        .server-card { background: #222; border: 1px solid #4caf50; padding: 15px; margin: 15px auto; border-radius: 10px; width: 90%; max-width: 500px; }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">← رجوع</a>
    <button class="admin-btn" onclick="openMenu()">⚙️ إعدادات</button>

    <div id="adminPanel" class="panel-box">
        <input type="text" id="sName" placeholder="اسم السيرفر">
        <input type="text" id="sIp" placeholder="الايبي">
        <input type="text" id="sPort" placeholder="البورت">
        <button onclick="saveServer()" style="background:#4caf50; color:white; width:95%">نشر سيرفر</button>
        <hr>
        <h3>طلبات التقديم 📥</h3>
        <div id="appsList"></div>
    </div>

    <div class="panel-box visible" style="border-color: #ff9800;">
        <h2>تقديم على السيرفر 📝</h2>
        <input type="text" id="mName" placeholder="اسمك">
        <input type="text" id="mVer" placeholder="النسخة/الإصدار">
        <button onclick="sendApp()" style="background:#ff9800; color:white; width:95%">إرسال الطلب</button>
    </div>

    <h1>قائمة المقبولين ✅</h1>
    <div id="acceptedList"></div>

    <h1>قائمة السيرفرات 🌐</h1>
    <div id="serverList"></div>

    <script>
        document.getElementById('serverList').innerHTML = localStorage.getItem('myServers_v4') || "";
        document.getElementById('appsList').innerHTML = localStorage.getItem('myApps_v4') || "";
        document.getElementById('acceptedList').innerHTML = localStorage.getItem('myAccepted_v4') || "";

        function openMenu() {
            const pass = prompt("كلمة المرور:");
            if(pass === "20077412") { document.getElementById('adminPanel').classList.toggle('visible'); }
            else { alert("خطأ!"); }
        }

        function sendApp() {
            const name = document.getElementById('mName').value;
            const ver = document.getElementById('mVer').value;
            const card = `<div class="server-card"><h3>${name}</h3><p>الطلب: ${ver}</p><button onclick="approve(this, '${name}')" style="background:#007bff; color:white">موافقة</button></div>`;
            document.getElementById('appsList').innerHTML += card;
            localStorage.setItem('myApps_v4', document.getElementById('appsList').innerHTML);
            alert("تم إرسال طلبك!");
        }

        function approve(btn, name) {
            const card = `<div class="server-card"><h3>${name}</h3><p>مبارك! تم قبولك في السيرفر.</p><p>الايبي: 123.456.78.9 | البورت: 19132</p></div>`;
            document.getElementById('acceptedList').innerHTML += card;
            btn.parentElement.remove();
            localStorage.setItem('myAccepted_v4', document.getElementById('acceptedList').innerHTML);
            localStorage.setItem('myApps_v4', document.getElementById('appsList').innerHTML);
        }

        function saveServer() {
            const card = `<div class="server-card"><h3>${document.getElementById('sName').value}</h3><p>الايبي: ${document.getElementById('sIp').value}</p></div>`;
            document.getElementById('serverList').innerHTML += card;
            localStorage.setItem('myServers_v4', document.getElementById('serverList').innerHTML);
            alert("تم النشر!");
        }
    </script>
</body>
</html>
