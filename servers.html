<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سيرفرات مرتضى علي - النظام المتكامل</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* شريط الشات الجانبي */
        #chat-sidebar { width: 350px; background: #2f3136; border-left: 1px solid #202225; display: flex; flex-direction: column; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; }
        .msg { background: #40444b; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-right: 3px solid #5865F2; font-size: 14px; }
        
        /* منطقة المحتوى */
        #content { flex: 1; padding: 20px; overflow-y: auto; text-align: center; }
        .server-card { background: #222; border: 1px solid #4caf50; padding: 15px; margin: 15px auto; border-radius: 10px; width: 90%; max-width: 500px; text-align: right; position: relative; }
        
        /* الإعدادات */
        .menu-box, .panel-box { background: #1a1a1a; border: 2px solid #4caf50; padding: 20px; border-radius: 15px; margin: 20px auto; width: 90%; max-width: 500px; display: none; }
        input[type="text"] { width: 90%; padding: 10px; border-radius: 5px; border: 1px solid #555; background: #333; color: white; margin-bottom: 10px; }
        button { cursor: pointer; border: none; padding: 10px; border-radius: 5px; margin: 5px; font-weight: bold; }
        .admin-btn { background: #333; border: 1px solid #4caf50; color: white; padding: 8px 15px; }
        .copy-btn { background: #4caf50; color: white; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="chat-sidebar">
        <div id="user-info" style="padding:10px; text-align:center;">
            <button id="loginBtn" onclick="loginWithGoogle()" style="background:#5865F2; padding:10px; border:none; color:white; border-radius:5px;">تسجيل دخول بجوجل</button>
        </div>
        <div id="chatBox"></div>
        <div style="padding:10px; display:flex;">
            <input type="text" id="msgInput" placeholder="رسالتك..." style="flex:1;">
            <button onclick="sendMsg()" style="background:#4caf50; color:white;">إرسال</button>
        </div>
    </div>

    <div id="content">
        <h1>سيرفرات مرتضى علي</h1>
        <button class="admin-btn" onclick="openMenu()">⚙️ إعدادات الإدارة</button>
        
        <div id="menuBox" class="menu-box">
            <button onclick="showPanel('add')" style="background:#4caf50; color:white;">➕ إضافة</button>
            <button onclick="showPanel('del')" style="background:#ff4d4d; color:white;">🗑️ حذف</button>
        </div>

        <div id="addPanel" class="panel-box">
            <input type="text" id="sName" placeholder="اسم السيرفر">
            <input type="text" id="sIp" placeholder="الايبي">
            <input type="text" id="sPort" placeholder="البورت">
            <button onclick="saveServer()" style="background:#4caf50; color:white;">حفظ ونشر</button>
        </div>

        <div id="serverList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

        const firebaseConfig = { databaseURL: "https://mychatapp-87d3e-default-rtdb.firebaseio.com/", apiKey: "AIzaSyCdWY5KWaRDqfkQhIuGfBjHShYKiKAalsY", projectId: "mychatapp-87d3e" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // الشات
        window.loginWithGoogle = () => signInWithPopup(auth, provider).then(r => document.getElementById('user-info').innerHTML = `أهلاً: ${r.user.displayName}`);
        window.sendMsg = () => {
            if(!auth.currentUser) return alert("سجل دخول أولاً!");
            push(ref(db, 'chat/'), { name: auth.currentUser.displayName, text: document.getElementById('msgInput').value });
            document.getElementById('msgInput').value = "";
        };
        onValue(ref(db, 'chat/'), (s) => {
            const box = document.getElementById('chatBox');
            box.innerHTML = "";
            s.forEach(c => box.innerHTML += `<div class="msg"><b>${c.val().name}:</b> ${c.val().text}</div>`);
        });

        // إدارة السيرفرات
        document.getElementById('serverList').innerHTML = localStorage.getItem('myServers_v3') || "";
        window.openMenu = () => { const p = prompt("كلمة المرور:"); if(p === "20077412") document.getElementById('menuBox').style.display = "block"; };
        window.showPanel = (t) => { document.getElementById('menuBox').style.display = "none"; document.getElementById('addPanel').style.display = "block"; };
        window.saveServer = () => {
            const html = `<div class="server-card"><h3>${document.getElementById('sName').value}</h3><p>الايبي: ${document.getElementById('sIp').value}</p><p>البورت: ${document.getElementById('sPort').value}</p></div>`;
            document.getElementById('serverList').innerHTML += html;
            localStorage.setItem('myServers_v3', document.getElementById('serverList').innerHTML);
            location.reload();
        };
    </script>
</body>
</html>
