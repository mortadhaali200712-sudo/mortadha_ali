<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سيرفرات مرتضى علي - نظام التواصل</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* القائمة الجانبية (السيرفرات) */
        #main-content { flex: 1; overflow-y: auto; padding: 20px; text-align: center; }
        
        /* منطقة الشات (شبه ديسكورد) */
        #chat-sidebar { width: 350px; background: #2f3136; border-right: 1px solid #202225; display: flex; flex-direction: column; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; }
        .msg { background: #40444b; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; border-right: 3px solid #4caf50; }
        
        /* التنسيقات السابقة للسيرفرات */
        .server-card { background: #222; border: 1px solid #4caf50; padding: 15px; margin: 15px auto; border-radius: 10px; width: 90%; max-width: 500px; text-align: right; }
        button { cursor: pointer; border: none; padding: 8px; border-radius: 5px; margin: 5px; font-weight: bold; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #555; background: #333; color: white; margin: 5px; }
    </style>
</head>
<body>

    <!-- منطقة الشات الجانبية -->
    <div id="chat-sidebar">
        <h3 style="text-align: center; color: #4caf50;">المحادثة المباشرة</h3>
        <div id="chat-box"></div>
        <div style="padding: 10px; background: #202225;">
            <input type="text" id="msg" placeholder="اكتب رسالتك..." style="width: 80%;">
            <button onclick="sendMessage()" style="background:#4caf50; color:white;">إرسال</button>
        </div>
    </div>

    <!-- منطقة عرض السيرفرات -->
    <div id="main-content">
        <h1>قائمة السيرفرات</h1>
        <button class="admin-btn" onclick="openMenu()">⚙️ إعدادات الإدارة</button>
        <div id="serverList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://mychatapp-87d3e-default-rtdb.firebaseio.com/",
            apiKey: "AIzaSyCdWY5KWaRDqfkQhIuGfBjHShYKiKAalsY",
            projectId: "mychatapp-87d3e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // وظائف الشات
        window.sendMessage = () => {
            const msgInput = document.getElementById("msg");
            if(msgInput.value.trim() !== "") {
                push(ref(db, 'messages/'), { text: msgInput.value });
                msgInput.value = "";
            }
        };

        onValue(ref(db, 'messages/'), (snapshot) => {
            const chat = document.getElementById("chat-box");
            chat.innerHTML = "";
            snapshot.forEach((child) => { chat.innerHTML += `<div class="msg">${child.val().text}</div>`; });
            chat.scrollTop = chat.scrollHeight;
        });

        // وظائف السيرفرات (كما كانت لديك)
        document.getElementById('serverList').innerHTML = localStorage.getItem('myServers_v3') || "";
        
        window.openMenu = () => {
            const pass = prompt("أدخل كلمة المرور:");
            if(pass === "20077412") { alert("تم فتح الإعدادات (أضف المنطق هنا)"); }
        };
    </script>
</body>
</html>
