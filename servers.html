<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سيرفرات مرتضى علي - نظام احترافي</title>
    <style>
        body { background: #36393f; color: #fff; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* القائمة الجانبية (التكت والسيرفرات) */
        #left-panel { width: 300px; background: #2f3136; border-left: 1px solid #202225; display: flex; flex-direction: column; }
        .panel-header { padding: 15px; border-bottom: 1px solid #202225; font-weight: bold; color: #4caf50; }
        #serverList { flex: 1; padding: 15px; overflow-y: auto; }
        
        /* منطقة الشات (الوسط) */
        #chat-main { flex: 1; display: flex; flex-direction: column; background: #36393f; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; }
        
        /* شكل رسائل الشات */
        .msg-container { display: flex; margin-bottom: 15px; align-items: flex-start; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #5865F2; margin-left: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .msg-content { background: #40444b; padding: 10px; border-radius: 8px; width: 100%; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        /* حقل الإدخال */
        .chat-input { padding: 20px; background: #2f3136; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; background: #40444b; color: white; }
        button { padding: 10px 20px; background: #4caf50; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="left-panel">
        <div class="panel-header">📋 قائمة السيرفرات والتكتات</div>
        <div id="serverList"></div>
    </div>

    <div id="chat-main">
        <div id="chat-box"></div>
        <div class="chat-input">
            <input type="text" id="msg" placeholder="اكتب رسالتك هنا...">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://mychatapp-87d3e-default-rtdb.firebaseio.com/",
            apiKey: "AIzaSyCdWY5KWaRDqfkQhIuGfBjHShYKiKAalsY",
            projectId: "mychatapp-87d3e"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // طلب اسم المستخدم عند التحميل
        const userName = prompt("أدخل اسمك الكريم:") || "زائر";

        // إرسال الرسالة
        window.sendMessage = () => {
            const msgInput = document.getElementById("msg");
            if(msgInput.value.trim()){
                push(ref(db, 'chat/'), { name: userName, text: msgInput.value, time: new Date().toLocaleTimeString() });
                msgInput.value = "";
            }
        };

        // عرض الرسائل
        onValue(ref(db, 'chat/'), (snapshot) => {
            const chat = document.getElementById("chat-box");
            chat.innerHTML = "";
            snapshot.forEach((c) => {
                const data = c.val();
                chat.innerHTML += `
                    <div class="msg-container">
                        <div class="avatar">${data.name.charAt(0)}</div>
                        <div class="msg-content">
                            <strong>${data.name}</strong> <span style="font-size: 10px; color: #aaa;">${data.time}</span><br>
                            ${data.text}
                        </div>
                    </div>`;
            });
            chat.scrollTop = chat.scrollHeight;
        });

        // استدعاء السيرفرات المحفوظة
        document.getElementById('serverList').innerHTML = localStorage.getItem('myServers_v3') || "<p style='padding:10px; color:#aaa;'>لا توجد سيرفرات مضافة حالياً.</p>";
    </script>
</body>
</html>
