<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سيرفرات ماين كرافت</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .server-box { background: #1a1a1a; border: 2px solid #4caf50; padding: 20px; border-radius: 15px; margin-bottom: 20px; display: none; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex-grow: 1; padding: 8px; border-radius: 5px; border: none; }
        .btn { background: #4caf50; color: #fff; padding: 10px; border-radius: 5px; cursor: pointer; border: none; }
        .server-card { background: #222; border: 1px solid #4caf50; padding: 15px; margin: 10px 0; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- زر الدخول للوحة الإضافة (مخفي للزوار) -->
    <button onclick="adminLogin()" style="background:none; border:none; color:#555;">⚙️</button>

    <!-- لوحة الإضافة (تظهر فقط عند إدخال كلمة السر) -->
    <div id="adminPanel" class="server-box">
        <h3>لوحة إضافة سيرفر (للمدير فقط)</h3>
        <div class="row"><input type="text" id="ver" placeholder="نسخة اللعبة (Java/Bedrock)"></div>
        <div class="row"><input type="text" id="verNum" placeholder="إصدار السيرفر (مثال: 1.20)"></div>
        <div class="row"><input type="text" id="sName" placeholder="اسم السيرفر"></div>
        <div class="row"><input type="text" id="sIp" placeholder="ايبي السيرفر"></div>
        <button class="btn" onclick="saveServer()">نشر السيرفر</button>
    </div>

    <h1>قائمة السيرفرات المتاحة</h1>
    <div id="serverList"></div>

    <script>
        // تحميل السيرفرات عند فتح الصفحة
        document.getElementById('serverList').innerHTML = localStorage.getItem('myServers') || "لا يوجد سيرفرات حالياً";

        // حماية لوحة التحكم
        function adminLogin() {
            const pass = prompt("أدخل كلمة مرور المدير:");
            if(pass === "123") { // يمكنك تغيير كلمة السر هنا
                document.getElementById('adminPanel').style.display = "block";
            } else {
                alert("كلمة مرور خاطئة!");
            }
        }

        // دالة حفظ ونشر السيرفر
        function saveServer() {
            const ver = document.getElementById('ver').value;
            const verNum = document.getElementById('verNum').value;
            const sName = document.getElementById('sName').value;
            const sIp = document.getElementById('sIp').value;

            const card = `
                <div class="server-card">
                    <h3>${sName}</h3>
                    <p>النسخة: ${ver} | الإصدار: ${verNum}</p>
                    <p>الايبي: <strong>${sIp}</strong></p>
                </div>`;
            
            document.getElementById('serverList').innerHTML += card;
            // حفظ البيانات
            localStorage.setItem('myServers', document.getElementById('serverList').innerHTML);
            alert("تم نشر السيرفر بنجاح!");
        }
    </script>
</body>
</html>
