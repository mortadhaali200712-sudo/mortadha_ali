<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>السيرفرات والتكتات | مرتضى علي</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; margin: 0; }
        
        /* زر الرجوع */
        .back-btn { 
            position: fixed; top: 20px; left: 20px; background: linear-gradient(45deg, #4caf50, #2e7d32); 
            color: white; padding: 10px 20px; border-radius: 30px; text-decoration: none; font-weight: bold; z-index: 1000;
        }

        /* صندوق التكتات */
        .ticket-box { 
            background: #121212; border: 2px solid #ff9800; padding: 30px; 
            border-radius: 25px; margin: 80px auto; width: 90%; max-width: 500px;
            box-shadow: 0 10px 30px rgba(255, 152, 0, 0.2);
        }
        
        .ticket-input { 
            width: 80%; padding: 12px; border-radius: 10px; border: 1px solid #ff9800; 
            background: #222; color: white; margin-bottom: 15px; text-align: center;
        }
        
        .btn-ticket { 
            background: #ff9800; color: white; padding: 12px 30px; border: none; 
            border-radius: 10px; cursor: pointer; font-weight: bold; width: 85%;
        }
        
        h2 { color: #ff9800; margin-bottom: 20px; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← عودة للرئيسية</a>

    <!-- قسم التكتات فقط -->
    <div class="ticket-box">
        <h2>هل لديك استفسار؟ 💬</h2>
        <input type="text" id="username" class="ticket-input" placeholder="اكتب اسمك هنا...">
        <br>
        <button class="btn-ticket" onclick="createTicket()">➕ فتح تكت جديد</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCeuQF67GtK8JWBAEo9zKHM-RxLVeAhgcs",
            authDomain: "murtadaserver-bbe52.firebaseapp.com",
            databaseURL: "https://murtadaserver-bbe52-default-rtdb.firebaseio.com",
            projectId: "murtadaserver-bbe52",
            storageBucket: "murtadaserver-bbe52.firebasestorage.app",
            messagingSenderId: "816833804949",
            appId: "1:816833804949:web:c4793ec95fa69ea44c399c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function createTicket() {
            const name = document.getElementById('username').value;
            if (!name) { alert("يرجى كتابة اسمك أولاً!"); return; }
            const newTicket = db.ref('tickets/').push({ user: name, status: 'open' });
            window.location.href = "ticket.html?id=" + newTicket.key + "&name=" + encodeURIComponent(name);
        }
    </script>
</body>
</html>
