<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سكنات مرتضى علي</title>
    <style>
        body { 
            background: #050505; 
            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 20px; 
            margin: 0; 
        }
        
        h1 { color: #ff9800; margin-bottom: 20px; }

        .skins-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 15px; 
            max-width: 500px; 
            margin: 0 auto; 
        }

        .skin-box { 
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 15px; 
            border: 1px solid #333; 
            transition: 0.3s;
        }

        img { 
            width: 100%; 
            height: 150px; 
            object-fit: contain; 
            border-radius: 10px; 
            margin-bottom: 10px; 
            background: #222;
        }

        .btn { 
            display: block; 
            background: #ff9800; 
            color: black; 
            padding: 12px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 14px;
        }
        
        .back-btn { 
            display: inline-block; 
            margin-bottom: 30px; 
            color: #ff9800; 
            text-decoration: none; 
            border: 1px solid #ff9800; 
            padding: 10px 25px; 
            border-radius: 10px; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>مكتبة السكنات 👕</h1>
    <a href="index.html" class="back-btn">← الرجوع للرئيسية</a>

    <div class="skins-container">
        <!-- سكن قودي الجميل -->
        <div class="skin-box">
            <img src="https://cdn.phototourl.com/free/2026-07-12-3230b6e3-e85b-4419-b90c-66edbed4dbe7.png" alt="قودي الجميل">
            <p style="margin: 5px 0; font-size: 14px;">قودي الجميل</p>
            <a href="https://www.mediafire.com/file/g5h3cykxzi3s52m/%25D9%2581%25D9%2588%25D8%25AF%25D9%258A_%25D8%25A7%25D9%2584%25D8%25AC%25D9%2585%25D9%258A%25D9%2584_.png/file" class="btn">تحميل</a>
        </div>

        <!-- سكن مستر وذر -->
        <div class="skin-box">
            <img src="https://cdn.phototourl.com/free/2026-07-14-a6c482a8-8953-44ce-a014-d3da8256533e.png" alt="مستر وذر">
            <p style="margin: 5px 0; font-size: 14px;">مستر وذر</p>
            <a href="https://www.mediafire.com/view/ox4kerd6xxr2s1u/%25D9%2585%25D8%25B3%25D8%25AA%25D8%25B1_%25D9%2588%25D8%25B0%25D8%25B1.png/file" class="btn">تحميل</a>
        </div>

        <!-- سكن ميكي -->
        <div class="skin-box">
            <img src="https://cdn.phototourl.com/free/2026-07-14-fb7e23b4-2c44-4208-8ccf-2e91a76af36e.png" alt="ميكي">
            <p style="margin: 5px 0; font-size: 14px;">ميكي</p>
            <a href="https://www.mediafire.com/view/u45yoj6sc3a1dll/%25D9%2585%25D9%258A%25D9%2583%25D9%258A_%25282%2529.png/file" class="btn">تحميل</a>
        </div>
    </div>

</body>
</html>
