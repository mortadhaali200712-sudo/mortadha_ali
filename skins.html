<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سكنات مرتضى علي</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Cairo', Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 25px;
            color: #ff9800;
        }

        .skins-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .skin-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .skin-box:hover {
            transform: translateY(-500px) scale(1.02);
            border-color: #ff9800;
        }

        /* إطار الصورة المعالج بشكل ممتاز ونظيف بدون أي تمدد أو تشويه */
        .skin-box img {
            width: 100%;
            height: 220px;
            object-fit: contain;
            background: #111;
            border-radius: 8px;
            margin-bottom: 12px;
            padding: 5px;
        }

        .skin-box p {
            margin: 8px 0 12px 0;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
        }

        .btn {
            display: inline-block;
            background: #ff9800;
            color: #0f0f0f;
            padding: 10px 0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #ffa726;
        }
    </style>
</head>
