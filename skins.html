    <title>سكنات مرتضى علي</title>
    <style>
        body { 
            background: #050505; 
            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 20px; 
            margin: 0; 
        }
        
        h1 { color: #ff9800; margin-bottom: 20px; }

        .skins-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 15px; 
            max-width: 500px; 
            margin: 0 auto; 
        }

        .skin-box { 
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 15px; 
            border: 1px solid #333; 
            transition: 0.3s;
        }

        img { 
            width: 100%; 
            height: 150px; 
            object-fit: contain; 
            border-radius: 10px; 
            margin-bottom: 10px; 
            background: #222;
        }

        .btn { 
            display: block; 
            background: #ff9800; 
            color: black; 
            padding: 12px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 14px;
            cursor: pointer;
        }
        
        .back-btn { 
            display: inline-block; 
            margin-bottom: 30px; 
            color: #ff9800; 
            text-decoration: none; 
            border: 1px solid #ff9800; 
            padding: 10px 25px; 
            border-radius: 10px; 
            font-weight: bold;
        }
    </style>
</head>
