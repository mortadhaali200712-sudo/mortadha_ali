<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سكنات مرتضى علي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #ff9800;
            --brand-secondary: #f57c00;
            --brand-accent: #ffb74d;
            --bg-base: #050507;
            --bg-surface: #101016;
            --bg-glass: rgba(16, 16, 22, 0.75);
            --border-glass: rgba(255, 152, 0, 0.18);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --transition-swift: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding: 40px 5% 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animated Aurora & Glow Lights Background */
        .aurora-background {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
            background: var(--bg-base);
        }
        
        .aurora-orb {
            position: absolute;
            width: 45vw;
            height: 45vw;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.15;
            animation: auroraFloat 18s ease-in-out infinite alternate;
        }
        
        .orb-one { background: var(--brand-primary); top: -20%; right: -10%; }
        .orb-two { background: #ff3d00; bottom: -20%; left: -10%; animation-delay: -6s; }

        @keyframes auroraFloat {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.06); }
            100% { transform: translate(-20px, 30px) scale(0.94); }
        }

        /* Header Layout & Typography */
        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 152, 0, 0.1);
            border: 1px solid var(--border-glass);
            padding: 8px 16px;
            border-radius: 50px;
            color: var(--brand-primary);
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }

        h1 { 
            color: var(--text-primary); 
            margin-bottom: 12px; 
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff 20%, var(--brand-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 35px;
            max-width: 600px;
            line-height: 1.6;
        }

        .back-btn { 
            display: inline-flex; 
            align-items: center;
            gap: 10px;
            margin-bottom: 45px; 
            color: var(--brand-primary); 
            text-decoration: none; 
            border: 1px solid var(--border-glass); 
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            padding: 12px 28px; 
            border-radius: 14px; 
            font-weight: 700;
            font-size: 0.95rem;
            transition: var(--transition-swift);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .back-btn:hover {
            background: rgba(255, 152, 0, 0.12);
            border-color: var(--brand-primary);
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(255, 152, 0, 0.25);
        }

        /* Smart Responsive Grid */
        .skins-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 30px; 
            max-width: 1100px; 
            width: 100%;
            margin: 0 auto; 
            align-items: start;
        }

        @media (max-width: 950px) {
            .skins-container { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 2.3rem; }
        }
        @media (max-width: 600px) {
            .skins-container { grid-template-columns: 1fr; max-width: 360px; }
            h1 { font-size: 2rem; }
        }

        /* Premium Gaming Card (Glassmorphism & Glow) */
        .skin-box { 
            background: var(--bg-surface); 
            padding: 20px; 
            border-radius: 22px; 
            border: 1px solid var(--border-glass); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            transition: var(--transition-swift);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            width: 100%;
        }

        .skin-box::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 22px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,152,0,0.4), transparent 60%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .skin-box:hover {
            transform: translateY(-8px);
            border-color: var(--brand-primary);
            box-shadow: 0 30px 60px rgba(255, 152, 0, 0.22);
        }

        .skin-box:hover::before {
            opacity: 1;
        }

        /* Image Wrapper & Exact Fit Preservation */
        .img-wrapper {
            width: 100%;
            height: 250px;
            background: #09090c;
            border-radius: 14px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
        }

        img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            border-radius: 8px;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }

        .skin-box:hover img {
            transform: scale(1.06);
        }

        /* Skin Title */
        .skin-box p {
            margin: 4px 0 16px 0; 
            font-size: 1.15rem; 
            font-weight: 800;
            color: var(--text-primary);
            text-align: right;
            letter-spacing: -0.3px;
        }

        /* Gaming Action Button (Epic/Steam Store Vibe) */
        .btn { 
            display: inline-flex; 
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--brand-primary); 
            color: #050507; 
            padding: 13px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 800; 
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            width: 100%;
            font-family: inherit;
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.3);
            transition: var(--transition-swift);
            position: relative;
            overflow: hidden;
        }
        
        .btn:hover { 
            background: var(--brand-accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 152, 0, 0.45);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Ripple Effect Script Styling */
        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
</head>

    <script>
        // Interactive Ripple Effect for Buttons
        document.addEventListener('click', function(e) {
            const target = e.target.closest('.btn, .back-btn');
            if (target) {
                const rect = target.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                
                target.style.position = 'relative';
                target.style.overflow = 'hidden';
                target.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            }
        });
    </script>
