<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سكنات مرتضى علي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #ff9800;
            --brand-accent: #ffb74d;
            --bg-base: #050507;
            --bg-surface: #101016;
            --border-glass: rgba(255, 152, 0, 0.18);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --transition-swift: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        body { 
            background: var(--bg-base); 
            color: var(--text-primary); 
            text-align: center; 
            font-family: 'Cairo', sans-serif; 
            padding: 30px 20px 60px; 
            margin: 0; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        h1 { 
            color: var(--text-primary); 
            margin-bottom: 10px; 
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 30%, var(--brand-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .back-btn { 
            display: inline-flex; 
            align-items: center;
            gap: 10px;
            margin-bottom: 35px; 
            color: var(--brand-primary); 
            text-decoration: none; 
            border: 1px solid var(--border-glass); 
            background: rgba(16, 16, 22, 0.75);
            padding: 10px 24px; 
            border-radius: 12px; 
            font-weight: 700;
            font-size: 0.95rem;
            transition: var(--transition-swift);
        }

        .back-btn:hover {
            background: rgba(255, 152, 0, 0.1);
            border-color: var(--brand-primary);
        }

        /* شبكة متجاوبة ذكية: بالحاسوب تعرض بجانب بعضها بحجم طبيعي، وبالهاتف تصبح صفاً واحداً متناسقاً */
        .skins-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 280px)); 
            justify-content: center;
            gap: 24px; 
            max-width: 950px; 
            width: 100%;
            margin: 0 auto; 
        }

        .skin-box { 
            background: var(--bg-surface); 
            padding: 16px; 
            border-radius: 18px; 
            border: 1px solid var(--border-glass); 
            transition: var(--transition-swift);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
        }

        .skin-box:hover {
            border-color: var(--brand-primary);
            transform: translateY(-4px);
        }

        /* إطار يلتف حول الصورة بالحجم الطبيعي بدون تمدد أو فراغات ضخمة */
        .img-wrapper {
            width: 100%;
            height: auto;
            aspect-ratio: auto;
            background: #09090c;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        img { 
            width: 100%; 
            height: auto; 
            max-height: 260px;
            object-fit: contain; 
            border-radius: 8px; 
            display: block !important;
        }

        .skin-box p {
            margin: 4px 0 12px 0; 
            font-size: 1.1rem; 
            font-weight: 800;
            color: var(--text-primary);
            width: 100%;
            text-align: center;
        }

        .btn { 
            display: inline-flex; 
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--brand-primary); 
            color: #050507; 
            padding: 12px; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: 800; 
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            width: 100%;
            font-family: inherit;
            transition: var(--transition-swift);
        }
        
        .btn:hover { 
            background: var(--brand-accent);
        }
    </style>
</head>
