    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body { 
            background-color: #0d0d0d;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0d0d0d 100%);
            color: #ffffff; 
            text-align: center; 
            font-family: 'Cairo', sans-serif; 
            padding: 50px 20px; 
            margin: 0; 
        }
        
        h1 { 
            color: #fff; 
            font-size: 3rem; 
            margin-bottom: 50px; 
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 3px solid #ff9800;
            display: inline-block;
            padding-bottom: 10px;
        }

        .skins-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 30px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }

        .skin-box { 
            background: #161616; 
            padding: 20px; 
            border-radius: 20px; 
            border: 2px solid #2a2a2a; 
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .skin-box:hover { 
            border-color: #ff9800;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 152, 0, 0.4);
        }

        img { 
            width: 100%; 
            height: 220px; 
            object-fit: cover; 
            border-radius: 15px; 
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        p { font-weight: bold; font-size: 1.3rem; margin-bottom: 20px; color: #ff9800; }

        .btn { 
            display: block; 
            background: linear-gradient(45deg, #ff9800, #ff5722); 
            color: white; 
            padding: 15px; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 1.1rem;
            transition: 0.3s;
            text-shadow: 1px 1px 2px black;
        }
        
        .btn:hover { 
            transform: translateY(-3px);
            filter: brightness(1.2);
        }
        
        .back-btn { 
            display: inline-block; 
            margin-bottom: 50px; 
            color: white; 
            text-decoration: none; 
            background: #222;
            padding: 10px 30px; 
            border-radius: 50px; 
            border: 1px solid #444;
            transition: 0.3s;
        }
        
        .back-btn:hover { background: #333; }
    </style>
</head>
