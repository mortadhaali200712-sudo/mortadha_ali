<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سكنات مرتضى علي | المميزة</title>
    <style>
        body { 
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a); 
            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 40px 20px; 
            margin: 0; 
            min-height: 100vh;
        }
        
        h1 { color: #ff9800; margin-bottom: 40px; font-size: 2.5rem; text-shadow: 0 0 10px rgba(255, 152, 0, 0.5); }

        .skins-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 25px; 
            max-width: 800px; 
            margin: 0 auto; 
        }

        .skin-box { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .skin-box:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 10px 25px rgba(255, 152, 0, 0.2);
            border-color: #ff9800;
        }

        img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            border: 2px solid #333;
        }

        p { font-weight: bold; font-size: 1.1rem; margin-bottom: 15px; }

        .btn { 
            display: block; 
            background: #ff9800; 
            color: #000; 
            padding: 12px; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold; 
            transition: background 0.3s;
        }
        
        .btn:hover { background: #e68900; }
        
        .back-btn { 
            display: inline-block; 
            margin-bottom: 40px; 
            color: #ff9800; 
            text-decoration: none; 
            border: 2px solid #ff9800; 
            padding: 10px 30px; 
            border-radius: 50px; 
            font-weight: bold;
            transition: 0.3s;
        }
        
        .back-btn:hover { background: #ff9800; color: black; }
    </style>
</head>
