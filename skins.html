<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سكنات مرتضى علي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #ff9800;
            --brand-accent: #ffb74d;
            --bg-base: #07070a;
            --bg-surface: #13131a;
            --border-glass: rgba(255, 152, 0, 0.18);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        body { 
            background: var(--bg-base); 
            color: var(--text-primary); 
            text-align: center; 
            font-family: 'Cairo', sans-serif; 
            padding: 30px 4% 60px; 
            margin: 0; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 70vw;
            height: 50vh;
            background: radial-gradient(circle, rgba(255, 152, 0, 0.08) 0%, transparent 70%);
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
        }
        
        h1 { 
            color: var(--text-primary); 
            margin-bottom: 10px; 
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 30%, var(--brand-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .back-btn { 
            display: inline-flex; 
            align-items: center;
            gap: 10px;
            margin-bottom: 35px; 
            color: var(--brand-primary); 
            text-decoration: none; 
            border: 1px solid var(--border-glass); 
            background: rgba(19, 19, 26, 0.7);
            backdrop-filter: blur(15px);
            padding: 12px 28px; 
            border-radius: 14px; 
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .back-btn:hover {
            background: rgba(255, 152, 0, 0.1);
            border-color: var(--brand-primary);
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(255, 152, 0, 0.2);
        }

        .skins-container { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 24px; 
            max-width: 1300px; 
            width: 100%;
            margin: 0 auto; 
            align-items: start;
        }

        @media (max-width: 1200px) {
            .skins-container { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 900px) {
            .skins-container { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .skins-container { grid-template-columns: 1fr; }
        }

        .skin-box { 
            background: var(--bg-surface); 
            padding: 18px; 
            border-radius: 20px; 
            border: 1px solid var(--border-glass); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .skin-box::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,152,0,0.5), transparent 70%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .skin-box:hover { 
            transform: translateY(-8px); 
            border-color: var(--brand-primary);
            box-shadow: 0 25px 50px rgba(255, 152, 0, 0.25);
        }

        .skin-box:hover::after {
            opacity: 1;
        }

        img { 
            width: 100%; 
            height: auto; 
            max-height: 280px;
            object-fit: contain; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            background: #0b0b0e;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .skin-box:hover img {
            transform: scale(1.05);
        }

        .skin-box p {
            margin: 5px 0; 
            font-size: 14px; 
            font-weight: 800;
            color: var(--text-primary);
            text-align: right;
        }

        .btn { 
            display: inline-flex; 
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--brand-primary); 
            color: #050505; 
            padding: 13px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 800; 
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            width: 100%;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .btn:hover { 
            background: var(--brand-accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 152, 0, 0.45);
        }
    </style>
</head>
