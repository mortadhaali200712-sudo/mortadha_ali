<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مودات</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        .mod-card { background: #1a1a1a; border: 1px solid #4caf50; padding: 15px; margin: 10px auto; width: 90%; max-width: 400px; border-radius: 15px; text-align: right; }
        .mod-img { width: 100%; aspect-ratio: 16/9; border-radius: 10px; object-fit: cover; margin-bottom: 10px; }
        .btn { padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; margin-left: 5px; font-weight: bold; }
        .download-btn { background: #4caf50; color: #000; text-decoration: none; display: inline-block; }
        #admin-panel { display: none; background: #222; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #fff; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <h2>لوحة التحكم (للمدير فقط)</h2>
        <input type="text" id="name" placeholder="اسم المود"><br>
        <input type="text" id="link" placeholder="رابط التحميل"><br>
        <input type="file" id="imageFile"><br>
        <button onclick="addMod()" class="btn download-btn">نشر المود</button>
    </div>

    <h1>قسم المودات 📦</h1>
    <div id="modsList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";
        import { getStorage } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-storage.js";

        // *** ضع بيانات Firebase الخاصة بك هنا ***
        const firebaseConfig = {
            apiKey: "AIza...",
            authDomain: "...",
            projectId: "...",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // وظيفة عرض المودات
        async function renderMods() {
            const querySnapshot = await getDocs(collection(db, "mods"));
            const list = document.getElementById('modsList');
            list.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const m = doc.data();
                list.innerHTML += `
                    <div class="mod-card">
                        <img src="${m.img}" class="mod-img">
                        <span style="display:block; font-weight:bold; margin-bottom:10px;">${m.name}</span>
                        <a href="${m.link}" class="btn download-btn">تحميل</a>
                    </div>`;
            });
        }

        window.addMod = async () => {
            const name = document.getElementById('name').value;
            const link = document.getElementById('link').value;
            // هنا يتم الربط مع Storage لرفع الصورة والحصول على الرابط
            await addDoc(collection(db, "mods"), { name, link, img: "رابط_الصورة_المرفوعة" });
            alert("تم نشر المود!");
            renderMods();
        }

        renderMods();
    </script>
</body>
</html>
