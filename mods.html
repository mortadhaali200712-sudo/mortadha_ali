<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مودات</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .mod-card { background: #1a1a1a; border: 1px solid #4caf50; padding: 15px; margin: 10px auto; width: 350px; border-radius: 15px; text-align: right; }
        .mod-img { width: 80px; height: 80px; border-radius: 10px; display: block; margin-bottom: 10px; }
        .mod-name { font-weight: bold; font-size: 1.2em; display: block; margin-bottom: 10px; }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; text-decoration: none; color: #fff; font-weight: bold; margin-left: 5px; }
        .download-btn { background: #4caf50; }
        .copy-btn { background: #555; }
    </style>
</head>
<body>

    <h1>قائمة المودات</h1>

    <div class="mod-card" id="m1">
        <img src="رابط_الصورة_هنا" class="mod-img">
        <span class="mod-name">اسم المود هنا</span>
        <a href="رابط_التحميل_هنا" target="_blank" class="btn download-btn">تحميل</a>
        <button class="btn copy-btn" onclick="copyModLink('m1')">نسخ</button>
    </div>

    <script>
        function copyModLink(modId) {
            let fullLink = window.location.href.split('?')[0] + "?mod=" + modId;
            navigator.clipboard.writeText(fullLink).then(() => { alert("تم نسخ الرابط!"); });
        }
    </script>
</body>
</html>
