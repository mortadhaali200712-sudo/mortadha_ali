<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مودات ماين كرافت</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; padding: 20px; font-family: sans-serif; }
        .back-btn { background: #555; padding: 10px; display: inline-block; border-radius: 8px; text-decoration: none; color: white; margin-bottom: 20px; }
        
        /* تصميم صندوق البحث */
        #search { width: 90%; max-width: 400px; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 2px solid #4caf50; background: #222; color: #fff; text-align: center; }
        
        .mod-card { background: #1a1a1a; border: 1px solid #4caf50; padding: 15px; margin: 10px auto; width: 90%; max-width: 400px; border-radius: 15px; }
        .download-btn { background: #4caf50; color: #000; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅ رجوع للرئيسية</a>
    <h1>المودات 📦</h1>

    <!-- صندوق البحث -->
    <input type="text" id="search" onkeyup="searchMods()" placeholder="🔍 ابحث عن مود هنا...">

    <div id="modsList">
        <!-- ابدأ بإضافة المودات هنا -->
        <div class="mod-card">
            <span class="mod-name">مود الأسلحة v1</span>
            <a href="رابط_التحميل_هنا" target="_blank" class="download-btn">تحميل</a>
        </div>
        
        <!-- عند إضافة مود جديد، ضعه هنا -->
    </div>

    <script>
        function searchMods() {
            let input = document.getElementById('search').value.toLowerCase();
            let cards = document.getElementsByClassName('mod-card');
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].innerText.toLowerCase();
                cards[i].style.display = name.includes(input) ? "" : "none";
            }
        }
    </script>

</body>
</html>
