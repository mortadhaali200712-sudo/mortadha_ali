<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المودات</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        .back-btn { display: inline-block; background: #555; padding: 10px 20px; border-radius: 10px; text-decoration: none; color: #fff; margin-bottom: 20px; }
        
        /* تصميم المستطيلات (التبويبات) */
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .tab-btn { background: #1a1a1a; border: 2px solid #4caf50; color: #fff; padding: 15px 30px; border-radius: 15px; cursor: pointer; font-size: 18px; font-weight: bold; width: 150px; transition: 0.3s; }
        .tab-btn:hover, .tab-btn.active { background: #4caf50; color: #000; }

        #search { width: 90%; max-width: 400px; padding: 15px; margin-bottom: 30px; border-radius: 15px; border: 2px solid #4caf50; background: #1a1a1a; color: #fff; text-align: center; font-size: 16px; }
        
        .mod-card { background: #1a1a1a; border: 2px solid #4caf50; padding: 15px; margin: 20px auto; width: 90%; max-width: 400px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; }
        .mod-img { width: 100%; height: 220px; border-radius: 15px; margin-bottom: 15px; object-fit: cover; }
        .mod-name { font-weight: bold; font-size: 1.3em; display: block; margin-bottom: 15px; color: #4caf50; }
        .btn { padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; font-size: 14px; margin: 0 5px; }
        .download-btn { background: #4caf50; color: #000; }
        .copy-btn { background: #555; color: #fff; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅ رجوع للرئيسية</a>
    
    <!-- الأزرار -->
    <div class="tabs">
        <button class="tab-btn active" onclick="showSection('bedrock')">بيدروك</button>
        <button class="tab-btn" onclick="showSection('java')">جافا</button>
    </div>

    <h1>قسم المودات 📦</h1>
    <input type="text" id="search" onkeyup="searchMods()" placeholder="🔍 ابحث عن مود...">

    <!-- قسم البيدروك -->
    <div id="bedrockSection">
        <div class="mod-card" id="space"><img src="https://cdn.phototourl.com/free/2026-07-17-3329e4cb-b611-4d7f-99cb-b008bd43eca3.png" class="mod-img"><div class="mod-info"><span class="mod-name">مود الفضاء</span><a href="#" class="btn download-btn">تحميل</a><button class="btn copy-btn" onclick="copyModLink('space')">نسخ</button></div></div>
        <!-- (باقي مودات البيدروك هنا بنفس التنسيق) -->
        <div class="mod-card" id="skyblock"><img src="https://cdn.phototourl.com/free/2026-07-16-f4f8c00d-fa54-4665-a6a2-a70341c2ea84.png" class="mod-img"><div class="mod-info"><span class="mod-name">Skyblock 26.20</span><a href="#" class="btn download-btn">تحميل</a><button class="btn copy-btn" onclick="copyModLink('skyblock')">نسخ</button></div></div>
    </div>

    <!-- قسم الجافا -->
    <div id="javaSection" style="display: none;">
        <p style="color: #888; margin-top: 50px;">لا توجد مودات جافا حالياً. سأضيفها عند طلبك!</p>
    </div>

    <script>
        function showSection(section) {
            document.getElementById('bedrockSection').style.display = (section === 'bedrock') ? 'block' : 'none';
            document.getElementById('javaSection').style.display = (section === 'java') ? 'block' : 'none';
            
            // تحديث شكل الأزرار
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function copyModLink(modId) {
            let fullLink = window.location.origin + window.location.pathname + "?mod=" + modId;
            navigator.clipboard.writeText(fullLink).then(() => { alert("تم نسخ الرابط!"); });
        }

        function searchMods() {
            let input = document.getElementById('search').value.toLowerCase();
            let cards = document.getElementsByClassName('mod-card');
            for (let i = 0; i < cards.length; i++) {
                cards[i].style.display = cards[i].innerText.toLowerCase().includes(input) ? "" : "none";
            }
        }
    </script>
</body>
</html>
