<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="منصة مودات GTA 5 الاحترافية - استكشف وحمل أفضل المودات العالمية">
    <title>منصة مودات GTA 5 الاحترافية</title>
    <link rel="icon" href="https://images.weserv.nl/?url=cdn.phototourl.com/free/2026-07-17-3329e4cb-b611-4d7f-99cb-b008bd43eca3.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #f59e0b;
            --brand-secondary: #d97706;
            --brand-accent: #3b82f6;
            --bg-base: #09090b;
            --bg-surface: #121217;
            --bg-glass: rgba(18, 18, 23, 0.8);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --transition-swift: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding: 20px 4% 60px;
        }

        /* تخصيص Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(245, 158, 11, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--brand-primary);
        }

        /* خلفية GTA V Animated Gradient & Floating Lights */
        .aurora-background {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #09090b 70%);
        }
        .aurora-orb {
            position: absolute;
            width: 50vw;
            height: 50vw;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            animation: auroraFloat 15s ease-in-out infinite alternate;
        }
        .orb-one { background: #f59e0b; top: -10%; right: -10%; }
        .orb-two { background: #3b82f6; bottom: -10%; left: -10%; animation-delay: -5s; }

        @keyframes auroraFloat {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.05); }
            100% { transform: translate(-20px, 30px) scale(0.95); }
        }

        /* الهيدر والشعار */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 30%, var(--brand-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* أجهزة التشغيل (Platform Filter Tabs) */
        .platforms-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .platform-btn {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
            padding: 10px 22px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: inherit;
            transition: var(--transition-swift);
        }
        .platform-btn:hover, .platform-btn.active {
            background: var(--brand-primary);
            border-color: var(--brand-primary);
            color: #09090b;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
            transform: translateY(-2px);
        }

        /* شبكة عرض المودات الرئيسية */
        .mods-grid {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        /* بطاقة المود الفاخرة (Glassmorphism & Glow) */
        .mod-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: var(--transition-swift);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .mod-card:hover {
            transform: translateY(-6px);
            border-color: var(--brand-primary);
            box-shadow: 0 20px 40px rgba(245, 158, 11, 0.2);
        }
        .card-img-wrapper {
            position: relative;
            width: 100%;
            height: 180px;
            overflow: hidden;
            background: #000;
        }
        .card-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .mod-card:hover .card-img-wrapper img {
            transform: scale(1.08);
        }
        .card-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            color: var(--brand-primary);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .card-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
            justify-content: space-between;
        }
        .card-title {
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-glass);
            padding-top: 10px;
        }

        /* صفحة تفاصيل المود (Hidden by default) */
        .details-container {
            display: none;
            max-width: 1300px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 25px;
            transition: var(--transition-swift);
        }
        .back-btn:hover {
            border-color: var(--brand-primary);
            color: var(--brand-primary);
        }

        /* تخطيط صفحة التفاصيل (الكمبيوتر والهاتف) */
        .details-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }
        @media (max-width: 992px) {
            .details-layout {
                grid-template-columns: 1fr;
            }
        }

        .details-main {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* معرض الصور وفيديو اليوتيوب */
        .media-gallery {
            background: var(--bg-surface);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            overflow: hidden;
            padding: 16px;
        }
        .main-preview-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 14px;
            cursor: pointer;
            transition: var(--transition-swift);
        }
        .main-preview-img:hover {
            opacity: 0.95;
        }
        .thumbnails-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .thumb-item {
            width: 80px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition-swift);
            flex-shrink: 0;
        }
        .thumb-item.active, .thumb-item:hover {
            border-color: var(--brand-primary);
        }

        /* صندوق وصف المود */
        .content-box {
            background: var(--bg-surface);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 25px;
            line-height: 1.8;
            font-size: 0.98rem;
        }
        .content-box h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: var(--brand-primary);
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 8px;
        }
        .content-box pre, .content-box div {
            white-space: pre-wrap;
            font-family: inherit;
        }

        /* الشريط الجانبي (الإصدارات ومعلومات المود) */
        .details-sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .sidebar-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 20px;
        }
        .sidebar-card h3 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--brand-primary);
        }

        /* قائمة الإصدارات */
        .versions-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
        }
        .version-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            padding: 10px 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition-swift);
        }
        .version-item:hover {
            background: var(--brand-primary);
            color: #09090b;
            border-color: var(--brand-primary);
        }

        /* زر التحميل الفاخر */
        .download-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #09090b;
            padding: 14px;
            border-radius: 14px;
            font-weight: 800;
            text-decoration: none;
            font-size: 1.05rem;
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3);
            transition: var(--transition-swift);
            margin-top: 15px;
        }
        .download-action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(245, 158, 11, 0.5);
        }

        /* معلومات المود الإضافية */
        .meta-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-size: 0.9rem;
        }
        .meta-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 8px;
        }
        .meta-label {
            color: var(--text-secondary);
        }
        .author-link {
            color: var(--brand-primary);
            text-decoration: none;
            font-weight: 700;
        }
        .author-link:hover {
            text-decoration: underline;
        }

        /* نافذة تكبير الصورة (Lightbox) */
        .lightbox-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .lightbox-modal.active {
            display: flex;
        }
        .lightbox-content {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 12px;
        }
        .lightbox-close {
            position: absolute;
            top: 25px;
            left: 25px;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
        }
    </style>
</head>
<body>

    <!-- خلفية تفاعلية -->
    <div class="aurora-background">
        <div class="aurora-orb orb-one"></div>
        <div class="aurora-orb orb-two"></div>
    </div>

    <!-- الصفحة الرئيسية -->
    <div id="homeView">
        <header>
            <h1>GTA 5 Mods Hub 🎮</h1>
            <div class="platforms-bar" id="platformsBar">
                <button class="platform-btn active" onclick="filterPlatform('All')">الكل</button>
                <button class="platform-btn" onclick="filterPlatform('PC')">PC</button>
                <button class="platform-btn" onclick="filterPlatform('PS4')">PS4</button>
                <button class="platform-btn" onclick="filterPlatform('PS5')">PS5</button>
                <button class="platform-btn" onclick="filterPlatform('Xbox')">Xbox</button>
            </div>
        </header>

        <main class="mods-grid" id="modsGrid">
            <!-- يتم تعبئة المودات ديناميكياً عبر الجافاسكريبت -->
        </main>
    </div>

    <!-- صفحة تفاصيل المود -->
    <div id="detailsView" class="details-container">
        <button class="back-btn" onclick="goBackToHome()">
            <i class="fas fa-arrow-right"></i> العودة للقائمة الرئيسية
        </button>

        <div class="details-layout">
            <!-- القسم الأوسط (الصور، الوصف) -->
            <div class="details-main">
                <div class="media-gallery">
                    <img id="mainPreviewImg" src="" alt="Mod Preview" class="main-preview-img" onclick="openLightbox(this.src)">
                    <div class="thumbnails-row" id="thumbnailsRow">
                        <!-- صور مصغرة -->
                    </div>
                </div>

                <div class="content-box">
                    <h2>تفاصيل المود (Description)</h2>
                    <div id="modDescriptionContent"></div>
                </div>
            </div>

            <!-- الشريط الجانبي (الإصدارات ومعلومات المود) -->
            <div class="details-sidebar">
                <div class="sidebar-card">
                    <h3><i class="fas fa-download"></i> التحميل والإصدارات</h3>
                    <div class="versions-list" id="versionsList">
                        <!-- روابط الإصدارات -->
                    </div>
                    <a id="primaryDownloadBtn" href="#" target="_blank" class="download-action-btn">
                        <i class="fas fa-cloud-download-alt"></i> تحميل الإصدار الأخير
                    </a>
                </div>

                <div class="sidebar-card">
                    <h3><i class="fas fa-info-circle"></i> معلومات المود</h3>
                    <div class="meta-list">
                        <div class="meta-row">
                            <span class="meta-label">التصنيف</span>
                            <span id="metaCategory">-</span>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">الجهاز</span>
                            <span id="metaPlatform">-</span>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">الإصدار الحالي</span>
                            <span id="metaVersion">-</span>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">تاريخ الإضافة</span>
                            <span id="metaDate">-</span>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">صاحب المود</span>
                            <a id="metaAuthorLink" href="#" target="_blank" class="author-link">-</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة تكبير الصور -->
    <div class="lightbox-modal" id="lightboxModal" onclick="closeLightbox()">
        <button class="lightbox-close">&times;</button>
        <img class="lightbox-content" id="lightboxImg">
    </div>

    <script>
        /* 
          ⚡ قاعدة بيانات المودات القابلة للتطوير بسهولة تامة 
          التصنيف هنا تم تعيينه إلى "خرائط / Maps" بناءً على طلبك.
        */
        const modsDatabase = [
            {
                id: "oil-rig",
                title: "منصة النفط [إضافة خاصة / FiveM] Oil Rig [Add-On SP / FiveM]",
                category: "خرائط / Maps",
                platform: "PC",
                currentVersion: "1.2.1",
                releaseDate: "2026-07-24",
                author: "LouieDevs",
                authorUrl: "https://www.gta5-mods.com/maps/oil-rig-add-on-sp-fivem",
                images: [
                    "https://images.weserv.nl/?url=cdn.phototourl.com/free/2026-07-17-3329e4cb-b611-4d7f-99cb-b008bd43eca3.png",
                    "https://images.weserv.nl/?url=cdn.phototourl.com/free/2026-07-16-f4f8c00d-fa54-4665-a6a2-a70341c2ea84.png"
                ],
                description: `الوصف: إضافة منصة نفط صغيرة بتكلفة أقل من LS
-----------------------------------------
حقوق الملكية:
"Louies Development" (أنا) لمنصة النفط ومبنى العرض المؤقت!
-----------------------------------------
--سجل التغييرات--
1.0 - الإصدار
1.1 - تم إصلاح الحواجز الواقية
1.1.1 - تم إصلاح التنزيل لـ FiveM
1.2 - تم إصلاح مشكلة عدم ظهور منصة منصة النفط في وضع اللاعب الفردي
1.2.1 - تم إصلاح مشكلة عدم ظهور منصة منصة النفط في وضع اللاعب الفردي مرة أخرى
-----------------------------------------
الميزات: 3x إضاءة LOD
داخلية ، 1500 LOD Dist لمنصة النفط، إضاءة جيدة 
-----------------------------------------
التثبيت في FiveM: 
أ - افتح الملف باستخدام 7zip أو Winrar أو أي برنامج آخر يسمح لك بفك ضغط هذا النوع من الملفات. 
ب - فك ضغط الملف في مجلد الخريطة وابدأ من ملف server.cfg. 

التثبيت في وضع اللاعب الفردي: 
أ - افتح OpenIV وقم بتمكين وضع التحرير. 
ب - انتقل إلى المسار mods\update\x64\dlcpacks. 
ج - اسحب مجلد DLC الخاص بالخريطة إلى مجلد dlcpacks ثم انسخ اسم مجلد DLC هذا. 
د - ارجع إلى افتح مجلد التحديث وانقر نقرًا مزدوجًا لفتح ملف update.rpf. 
هـ - افتح مجلد common\data، وابحث عن ملف dlclist.xml، وانقر عليه بزر الماوس الأيمن، ثم اختر "تحرير". 
و - انتقل إلى أسفل الملف، وانسخ السطر الأخير من التعليمات البرمجية، واضغط على مفتاح الإدخال، ثم الصقه في سطر جديد. 
ز - استبدل اسم DLC في السطر الجديد باسم مجلد DLC الخاص بخريطتك. 
ح - احفظ الملف. اكتمل التثبيت، شغّل اللعبة لاستخدام التعديل.

--------------------------------------------------

Description: Adds a small Oil Rig off the cost of LS
-----------------------------------------
Credits:
"Louies Development" (Me) for the Oil Rig & Temp Building Prop!
-----------------------------------------
--Changelog--
1.0 - Release
1.1 - Fixed guardrails
1.1.1 - Fixed Download for FiveM
1.2 - Fixed Oil Rig Platform not showing up on Singleplayer
1.2.1 - Fixed Oil Rig Platform not showing up on Singleplayer AGAIN
-----------------------------------------
Features:
3x Interior
LOD Lights
1500 LOD Dist for Oil Rig Prop
Well lit`,
                versions: [
                    { version: "1.2.1", link: "https://www.mediafire.com/file/nt3eivb3rmvguu5/5b3aaf-LD_SmoilRig_SP_FIX_AGAIN.rar/file" }
                ]
            }
        ];

        // عرض المودات في القائمة الرئيسية
        function renderHomeMods(filter = 'All') {
            const grid = document.getElementById('modsGrid');
            grid.innerHTML = '';

            const filteredMods = filter === 'All' ? modsDatabase : modsDatabase.filter(m => m.platform === filter);

            if(filteredMods.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 40px;">لا توجد مودات متاحة لهذا الجهاز حالياً.</div>`;
                return;
            }

            filteredMods.forEach(mod => {
                grid.innerHTML += `
                    <div class="mod-card" onclick="openModDetails('${mod.id}')">
                        <div class="card-img-wrapper">
                            <img src="${mod.images[0]}" alt="${mod.title}" loading="lazy">
                            <span class="card-badge">${mod.platform}</span>
                        </div>
                        <div class="card-body">
                            <h3 class="card-title">${mod.title}</h3>
                            <div class="card-meta">
                                <span>${mod.category}</span>
                                <span><i class="fas fa-download"></i> ${mod.versions.length} إصدارات</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // فلترة حسب الجهاز
        function filterPlatform(platform) {
            document.querySelectorAll('.platform-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderHomeMods(platform);
        }

        // فتح صفحة التفاصيل
        function openModDetails(modId) {
            const mod = modsDatabase.find(m => m.id === modId);
            if(!mod) return;

            document.getElementById('homeView').style.display = 'none';
            document.getElementById('detailsView').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // تعبئة البيانات
            document.getElementById('mainPreviewImg').src = mod.images[0];
            document.getElementById('modDescriptionContent').innerText = mod.description;
            
            document.getElementById('metaCategory').innerText = mod.category;
            document.getElementById('metaPlatform').innerText = mod.platform;
            document.getElementById('metaVersion').innerText = mod.currentVersion;
            document.getElementById('metaDate').innerText = mod.releaseDate;
            
            const authorLink = document.getElementById('metaAuthorLink');
            authorLink.innerText = mod.author;
            authorLink.href = mod.authorUrl;

            // زر التحميل الرئيسي (يتحمل أحدث إصدار)
            document.getElementById('primaryDownloadBtn').href = mod.versions[0].link;

            // معرض الصور المصغرة
            const thumbRow = document.getElementById('thumbnailsRow');
            thumbRow.innerHTML = '';
            mod.images.forEach((img, index) => {
                thumbRow.innerHTML += `<img src="${img}" class="thumb-item ${index === 0 ? 'active' : ''}" onclick="changeMainImage('${img}', this)">`;
            });

            // قائمة الإصدارات
            const versionsList = document.getElementById('versionsList');
            versionsList.innerHTML = '';
            mod.versions.forEach(ver => {
                versionsList.innerHTML += `
                    <div class="version-item" onclick="window.open('${ver.link}', '_blank')">
                        <span>إصدار ${ver.version}</span>
                        <i class="fas fa-download"></i>
                    </div>
                `;
            });
        }

        // تغيير الصورة الكبرى عند الضغط على المصغرة
        function changeMainImage(src, element) {
            document.getElementById('mainPreviewImg').src = src;
            document.querySelectorAll('.thumb-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }

        // العودة للرئيسية
        function goBackToHome() {
            document.getElementById('detailsView').style.display = 'none';
            document.getElementById('homeView').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Lightbox تكبير الصورة
        function openLightbox(src) {
            const modal = document.getElementById('lightboxModal');
            document.getElementById('lightboxImg').src = src;
            modal.classList.add('active');
        }
        function closeLightbox() {
            document.getElementById('lightboxModal').classList.remove('active');
        }

        // التشغيل الأولي
        renderHomeMods();
    </script>
</body>
</html>
