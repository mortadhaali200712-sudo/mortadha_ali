<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المودات</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        .back-btn { display: inline-block; background: #555; padding: 10px 20px; border-radius: 10px; text-decoration: none; color: #fff; margin-bottom: 20px; }
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .tab-btn { background: #1a1a1a; border: 2px solid #4caf50; color: #fff; padding: 15px 30px; border-radius: 15px; cursor: pointer; font-size: 18px; font-weight: bold; width: 150px; transition: 0.3s; }
        .tab-btn:hover, .tab-btn.active { background: #4caf50; color: #000; }
        #search { width: 90%; max-width: 400px; padding: 15px; margin-bottom: 30px; border-radius: 15px; border: 2px solid #4caf50; background: #1a1a1a; color: #fff; text-align: center; font-size: 16px; }
        .mod-card { background: #1a1a1a; border: 2px solid #4caf50; padding: 15px; margin: 20px auto; width: 90%; max-width: 400px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; transition: 0.5s; }
        .mod-card.highlight { border-color: #ffeb3b; box-shadow: 0 0 20px #ffeb3b; }
        .mod-img { width: 100%; height: 220px; border-radius: 15px; margin-bottom: 15px; object-fit: cover; }
        .mod-name { font-weight: bold; font-size: 1.3em; display: block; margin-bottom: 15px; color: #4caf50; }
        .btn { padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; font-size: 14px; margin: 0 5px; }
        .download-btn { background: #4caf50; color: #000; }
        .copy-btn { background: #555; color: #fff; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅ رجوع للرئيسية</a>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showSection('bedrock', this)">بيدروك</button>
        <button class="tab-btn" onclick="showSection('java', this)">جافا</button>
    </div>

    <h1>قسم المودات 📦</h1>
    <input type="text" id="search" onkeyup="searchMods()" placeholder="🔍 ابحث عن مود...">

    <div id="bedrockSection"></div>
    <div id="javaSection" style="display: none;"></div>

    <script>
        const bedrockList = [
            { id: "space", name: "مود الفضاء", img: "https://cdn.phototourl.com/free/2026-07-17-3329e4cb-b611-4d7f-99cb-b008bd43eca3.png", link: "https://download937.mediafire.com/bj6rn1umhpygOgROq2bvO-IUNUiUOfAn0Wx-FekYSvwooPmWGetqSgKIqvY7ndXkJD1QLIRk84-_KgiSK_1EinkkV26PXHV9n3NxX0DBKDp0gpMZJ2bKP_VxIAvIEDSYhfWdF50X_qc7sIKLeAoN1EcnczQKEt53HD7YGIMMwTWJ1ss/bvl0o7f1zv6rsjy/%D9%85%D9%88%D8%AF+%D8%A7%D9%84%D9%81%D8%B6%D8%A7%D8%A1+.mcaddon" },
            { id: "skyblock", name: "Skyblock 26.20", img: "https://cdn.phototourl.com/free/2026-07-16-f4f8c00d-fa54-4665-a6a2-a70341c2ea84.png", link: "https://download2284.mediafire.com/ii5ndblxc7ggLTDUQ_ihanRaPIUR2zJo2PBDiif4bRr2ulXV2XLqlrbGkHh7K4sosSNiNDc551OpUMTo_GkMXXOUAogPag35FmxC7rjMSJEvOuEVtSo_blYE4_e8dBUu3BLeinui6v7eKn1rkVYlvXnT2NiN-SK85Gtv3ezFRcYuiA/5lvbrnrlqtnm08c/%D8%B3%D9%83%D8%A7%D9%8A+%D8%A8%D9%84%D9%88%D9%83+.mcworld" },
            { id: "lantern", name: "مود الانتيرن الصيني", img: "https://cdn.phototourl.com/free/2026-07-15-32399c5a-45e6-4774-a4ef-fc8157778ea9.png", link: "https://download1649.mediafire.com/rknftz97fetgJCEhl3koG0pV0XTOskcc0e80qAMpRC5BIus9rdwQTEVHwsRxaBobdcDcOMivNn9rh6i7Oxie_UO9icRE2DZ0qIROdf5b8Hvz9mTLMoKOkIv5nzNGOkDwmrg0PfJ4RAq-c4uEa2eM38e5WiLWCHeu0i2Y8PD3AmuzDA/5zl2s5z3u5bww1y/%D9%85%D9%88%D8%AF+%D8%A7%D9%84%D8%A7%D9%86%D8%AA%D9%8A%D8%B1%D9%86+%D8%A7%D9%84%D8%B5%D9%8A%D9%86%D9%8A+.mcpack" }
        ];

        const javaList = [
            { id: "night-vision", name: "مود النايت فجن 26.1.2", img: "https://cdn.phototourl.com/free/2026-07-19-9bfe1583-6441-4d4d-beda-f6ed3fb72a1b.webp", link: "https://download2281.mediafire.com/t0w5ca5anf9ghbVnsX3v5f2OVtpiJbqZZRBolQoZy9x5p99El7gOVnVuwhqqr-LNBY5BiW-xG-2nEi8kIP7SKga5VabZOVJAZjnPfRPOdXPUMfJNcXJED75iUhwtlYTg_JnIo7lemqMeDNN9v191pb5J3LDry90HsxWTcVkZf9T9f0ky/2z094nhuuraf1ki/%D9%86%D8%A7%D9%8A%D8%AA+%D9%81%D8%AC%D9%86+%D9%84%D9%84%D8%AC%D8%A7%D9%81%D8%A7+26.1.2+.zip" }
        ];

        function renderMods(list, containerId) {
            const container = document.getElementById(containerId);
            list.forEach(mod => {
                container.innerHTML += `
                <div class="mod-card" id="${mod.id}">
                    <img src="${mod.img}" class="mod-img">
                    <div class="mod-info">
                        <span class="mod-name">${mod.name}</span>
                        <a href="${mod.link}" target="_blank" class="btn download-btn">تحميل</a>
                        <button class="btn copy-btn" onclick="copyModLink('${mod.id}')">نسخ الرابط</button>
                    </div>
                </div>`;
            });
        }

        renderMods(bedrockList, 'bedrockSection');
        renderMods(javaList, 'javaSection');

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const modId = urlParams.get('mod');
            if (modId) {
                const isJava = javaList.some(m => m.id === modId);
                if (isJava) showSection('java', document.querySelector('.tab-btn[onclick*="java"]'));
                else showSection('bedrock', document.querySelector('.tab-btn[onclick*="bedrock"]'));
                
                const element = document.getElementById(modId);
                if (element) {
                    setTimeout(() => {
                        element.scrollIntoView({ behavior: 'smooth' });
                        element.classList.add('highlight');
                        setTimeout(() => element.classList.remove('highlight'), 2000);
                    }, 500);
                }
            }
        };

        function showSection(section, btn) {
            document.getElementById('bedrockSection').style.display = (section === 'bedrock') ? 'block' : 'none';
            document.getElementById('javaSection').style.display = (section === 'java') ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
        }

        function copyModLink(modId) {
            let fullLink = window.location.href.split('?')[0] + "?mod=" + modId;
            navigator.clipboard.writeText(fullLink).then(() => { alert("تم نسخ رابط المود بنجاح!"); });
        }

        function searchMods() {
            let input = document.getElementById('search').value.toLowerCase();
            let cards = document.getElementsByClassName('mod-card');
            for (let i = 0; i < cards.length; i++) {
                cards[i].style.display = cards[i].innerText.toLowerCase().includes(input) ? "" : "none";
            }
        }
    </script>
</body>
</html>
