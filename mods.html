<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قسم المودات 📦</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        .back-btn { display: inline-block; background: #555; padding: 10px 20px; border-radius: 10px; text-decoration: none; color: #fff; margin-bottom: 20px; }
        #search { width: 90%; max-width: 400px; padding: 15px; margin-bottom: 30px; border-radius: 15px; border: 2px solid #4caf50; background: #1a1a1a; color: #fff; text-align: center; font-size: 16px; }
        .mod-card { background: #1a1a1a; border: 1px solid #4caf50; padding: 15px; margin: 10px auto; width: 90%; max-width: 400px; border-radius: 15px; display: flex; align-items: center; text-align: right; }
        /* تم تغييرها لـ cover لتعبئة المربع بالكامل */
        .mod-img { width: 80px; height: 80px; border-radius: 10px; margin-left: 15px; object-fit: cover; }
        .mod-info { flex-grow: 1; }
        .mod-name { font-weight: bold; font-size: 1.1em; display: block; margin-bottom: 8px; }
        .btn { padding: 8px 12px; border-radius: 8px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; font-size: 13px; margin-left: 5px; }
        .download-btn { background: #4caf50; color: #000; }
        .copy-btn { background: #555; color: #fff; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅ رجوع للرئيسية</a>
    <h1>قسم المودات 📦</h1>
    <input type="text" id="search" onkeyup="searchMods()" placeholder="🔍 ابحث عن مود...">

    <div id="modsList">
        
        <!-- قالب المود (مثال مود الرعب) -->
        <div class="mod-card">
            <img src="https://cdn.phototourl.com/free/2026-07-10-a18e8d6b-787f-4ea9-a29f-223e25e47948.webp" class="mod-img">
            <div class="mod-info">
                <span class="mod-name">مود الرعب</span>
                <a href="https://www.mediafire.com/file/5570wx2ac6zvwd4/مود_الرعب_.mcaddon/file" target="_blank" class="btn download-btn">تحميل</a>
                <!-- تم ربط الزر برابط الميديافاير المباشر -->
                <button class="btn copy-btn" onclick="copyLink('https://www.mediafire.com/file/5570wx2ac6zvwd4/مود_الرعب_.mcaddon/file')">نسخ</button>
            </div>
        </div>

        <!-- أضف باقي المودات بنفس الطريقة مع تغيير الرابط في onclick -->
    </div>

    <script>
        function searchMods() {
            let input = document.getElementById('search').value.toLowerCase();
            let cards = document.getElementsByClassName('mod-card');
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].innerText.toLowerCase();
                cards[i].style.display = name.includes(input) ? "" : "none";
            }
        }
        
        // هذه الدالة الآن تأخذ الرابط الذي تضعه لها في الزر وتنسخه
        function copyLink(link) {
            navigator.clipboard.writeText(link).then(function() {
                alert("تم نسخ رابط التحميل!");
            });
        }
    </script>
</body>
</html>
