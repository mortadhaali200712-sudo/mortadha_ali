<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المودات</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        .back-btn { display: inline-block; background: #555; padding: 10px 20px; border-radius: 10px; text-decoration: none; color: #fff; margin-bottom: 20px; }
        .admin-box { background: #1a1a1a; padding: 20px; border-radius: 15px; margin: 20px auto; border: 1px solid #4caf50; display: none; width: 90%; max-width: 400px; }
        .admin-input { width: 90%; padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; }
        #search { width: 90%; max-width: 400px; padding: 15px; margin-bottom: 30px; border-radius: 15px; border: 2px solid #4caf50; background: #1a1a1a; color: #fff; text-align: center; font-size: 16px; }
        .mod-card { background: #1a1a1a; border: 2px solid #4caf50; padding: 15px; margin: 20px auto; width: 90%; max-width: 400px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; }
        .mod-img { width: 100%; height: 220px; border-radius: 15px; margin-bottom: 15px; object-fit: cover; }
        .mod-name { font-weight: bold; font-size: 1.3em; margin-bottom: 15px; color: #4caf50; }
        .btn { padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; margin: 5px; }
        .download-btn { background: #4caf50; color: #000; }
        .copy-btn { background: #555; color: #fff; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅ رجوع للرئيسية</a>
    <br>
    <button onclick="toggleAdmin()" class="btn" style="background:#333;">⚙️ الإدارة</button>

    <div id="adminPanel" class="admin-box">
        <h3>➕ نشر مود جديد</h3>
        <input type="text" id="mName" class="admin-input" placeholder="اسم المود">
        <input type="text" id="mImg" class="admin-input" placeholder="رابط صورة المود">
        <input type="text" id="mLink" class="admin-input" placeholder="رابط التحميل">
        <button class="btn download-btn" onclick="saveNewMod()">نشر المود</button>
    </div>

    <h1>قسم المودات 📦</h1>
    <input type="text" id="search" onkeyup="searchMods()" placeholder="🔍 ابحث عن مود...">

    <div id="modsList">
        <div class="mod-card" id="magic"><img src="https://cdn.phototourl.com/free/2026-07-11-c4659a13-57c3-459a-89c3-cd9208cc422b.png" class="mod-img"><div class="mod-info"><span class="mod-name">مود سحر كرافت</span><a href="#" target="_blank" class="btn download-btn">تحميل</a><button class="btn copy-btn" onclick="copyModLink('magic')">نسخ</button></div></div>
        </div>
    
    <div id="newModsList"></div>

    <script>
        // تحميل المودات الجديدة عند فتح الصفحة
        document.getElementById('newModsList').innerHTML = localStorage.getItem('myNewMods') || "";

        function toggleAdmin() {
            if(prompt("كلمة السر:") === "20077412") {
                let p = document.getElementById('adminPanel');
                p.style.display = (p.style.display === "block") ? "none" : "block";
            }
        }

        function saveNewMod() {
            let name = document.getElementById('mName').value;
            let img = document.getElementById('mImg').value;
            let link = document.getElementById('mLink').value;
            let id = "mod_" + Date.now(); // إنشاء ID فريد

            let newCard = `
            <div class="mod-card" id="${id}">
                <img src="${img}" class="mod-img">
                <div class="mod-info">
                    <span class="mod-name">${name}</span>
                    <a href="${link}" target="_blank" class="btn download-btn">تحميل</a>
                    <button class="btn copy-btn" onclick="copyModLink('${id}')">نسخ</button>
                </div>
            </div>`;

            let current = localStorage.getItem('myNewMods') || "";
            localStorage.setItem('myNewMods', current + newCard);
            alert("تم نشر المود بنجاح!");
            location.reload();
        }

        function copyModLink(modId) {
            let fullLink = window.location.href.split('?')[0] + "?mod=" + modId;
            navigator.clipboard.writeText(fullLink).then(() => { alert("تم النسخ!"); });
        }

        function searchMods() {
            let input = document.getElementById('search').value.toLowerCase();
            let cards = document.getElementsByClassName('mod-card');
            for (let i = 0; i < cards.length; i++) {
                cards[i].style.display = cards[i].innerText.toLowerCase().includes(input) ? "" : "none";
            }
        }
    </script>
</body>
</html>
