        #search { width: 90%; max-width: 400px; padding: 15px; margin-bottom: 30px; border-radius: 15px; border: 2px solid #4caf50; background: #1a1a1a; color: #fff; text-align: center; font-size: 16px; }

        .mod-name { font-weight: bold; font-size: 1.1em; display: block; margin-bottom: 8px; }
        .btn { padding: 8px 12px; border-radius: 8px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; font-size: 13px; margin-left: 5px; }
        .download-btn { background: #4caf50; color: #000; }

    </style>

    <script>
        function searchMods() {
            let input = document.getElementById('search').value.toLowerCase();
            let cards = document.getElementsByClassName('mod-card');
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].innerText.toLowerCase();
                cards[i].style.display = name.includes(input) ? "" : "none";
            }
        }
        function copyLink() {
            let url = window.location.href;
            navigator.clipboard.writeText(url).then(function() {
                alert("تم نسخ رابط موقعنا، شاركه مع أصدقائك!");
            });
        }
    </script>
