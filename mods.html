<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مودات ماين كرافت</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        .back-btn { display: inline-block; background: #555; padding: 10px 20px; border-radius: 10px; text-decoration: none; color: #fff; margin-bottom: 20px; }
        
        #search { 
            width: 90%; max-width: 400px; padding: 15px; margin-bottom: 30px; 
            border-radius: 15px; border: 2px solid #4caf50; background: #1a1a1a; 
            color: #fff; text-align: center; font-size: 16px;
        }

        .mod-card { 
            background: #1a1a1a; border: 1px solid #4caf50; padding: 15px; 
            margin: 10px auto; width: 90%; max-width: 400px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .mod-name { font-weight: bold; font-size: 1.1em; }
        .download-btn { background: #4caf50; color: #000; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; border: 2px solid #fff; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅ رجوع للرئيسية</a>
    <h1>قسم المودات 📦</h1>

    <input type="text" id="search" onkeyup="searchMods()" placeholder="🔍 ابحث عن مود هنا...">

    <div id="modsList">
        <!-- مود لايف ستيل -->
        <div class="mod-card">
            <span class="mod-name">مود لايف ستيل</span>
            <a href="https://www.mediafire.com/file/bmdz1el2qal2gcg/%D9%84%D8%A7%D9%8A%D9%81_%D8%B3%D8%AA%D9%8A%D9%84_.mcaddon/file" target="_blank" class="download-btn">تحميل</a>
        </div><div class="mod-card">
            <span class="mod-name">مود الرعب</span>
            <a href="https://www.mediafire.com/file/5570wx2ac6zvwd4/%D9%85%D9%88%D8%AF_%D8%A7%D9%84%D8%B1%D8%B9%D8%A8_.mcaddon/file
" target="_blank" class="download-btn">تحميل</a>
        </div><div class="mod-card">
    <span class="mod-name">مود الديناصور</span>
    <a href="https://www.mediafire.com/file/dr3f3wtz8nnxd37/%D9%85%D9%88%D8%AF_%D8%A7%D9%84%D8%AF%D9%8A%D9%86%D8%A7%D8%B5%D9%88%D8%B1.mcaddon/file
" target="_blank" class="download-btn">تحميل</a>
</div>
    </div>

    <script>
        function searchMods() {
            let input = document.getElementById('search').value.toLowerCase();
            let cards = document.getElementsByClassName('mod-card');
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].innerText.toLowerCase();
                cards[i].style.display = name.includes(input) ? "" : "none";
            }
        }
    </script>
</body>
</html>
