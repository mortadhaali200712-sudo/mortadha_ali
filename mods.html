<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قسم المودات</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding: 20px; }
        .mod-card { background: #1a1a1a; border: 1px solid #4caf50; padding: 15px; margin: 10px auto; width: 300px; border-radius: 15px; }
        .mod-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 10px; }
        .btn { padding: 10px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; }
        .add-box { background: #222; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px dashed #4caf50; }
    </style>
</head>
<body>

    <div class="add-box">
        <h3>إضافة مود جديد</h3>
        <input type="text" id="name" placeholder="اسم المود"><br>
        <input type="text" id="desc" placeholder="الوصف"><br>
        <input type="text" id="link" placeholder="رابط التحميل"><br>
        <input type="file" id="imgFile" accept="image/*"><br>
        <button class="btn" onclick="addMod()">نشر المود</button>
    </div>

    <div id="modsList"></div>

    <script>
        function addMod() {
            const name = document.getElementById('name').value;
            const desc = document.getElementById('desc').value;
            const link = document.getElementById('link').value;
            const file = document.getElementById('imgFile').files[0];
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = e.target.result; // تحويل الصورة لكود
                const card = `
                    <div class="mod-card">
                        <img src="${img}" class="mod-img">
                        <h3>${name}</h3>
                        <p>${desc}</p>
                        <a href="${link}" class="btn" style="background:#4caf50">تحميل</a>
                    </div>`;
                document.getElementById('modsList').innerHTML += card;
                alert("تم إضافة المود!");
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
