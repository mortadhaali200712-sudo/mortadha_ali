<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortadha Ali | مرتضى علي - الموقع الرسمي</title>
    <link rel="icon" href="logo2.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* تعريف متغيرات الألوان والتصميم المعماري الفاخر لعام 2026 */
        :root {
            --primary: #2563EB;
            --secondary: #38BDF8;
            --success: #22C55E;
            --warning: #F59E0B;
            --dark: #0B1220;
            --dark-card: #111827;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(11, 18, 32, 0.85);
            --text-main: #FFFFFF;
            --text-muted: #94A3B8;
        }

        /* إعادة الضبط والأساسيات */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--dark);
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 15px;
            overflow-x: hidden;
            position: relative;
        }

        /* شريط التمرير المخصص */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--dark);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* مؤشر التحميل الاحترافي */
        #page-loader {
            position: fixed;
            inset: 0;
            background: var(--dark);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        #page-loader.loaded {
            opacity: 0;
            visibility: hidden;
        }
        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-right-color: var(--secondary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loader-text {
            font-size: 1.05em;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-main), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        /* الخلفية المتحركة وإضاءات الأورورا */
        .ambient-background {
            position: fixed;
            inset: 0;
            z-index: -2;
            overflow: hidden;
            background: linear-gradient(135deg, #050811 0%, #0B1220 50%, #04070d 100%);
            background-size: 400% 400%;
            animation: auroraGradient 18s ease infinite;
        }
        @keyframes auroraGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .floating-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            pointer-events: none;
            animation: floatShape 12s ease-in-out infinite alternate;
        }
        .shape-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            right: -100px;
        }
        .shape-2 {
            width: 450px;
            height: 450px;
            background: var(--success);
            bottom: -150px;
            left: -150px;
            animation-delay: -4s;
            animation-direction: alternate-reverse;
        }
        @keyframes floatShape {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -40px) scale(1.1); }
        }

        /* تأثير مطر الإيموجي */
        .emoji-rain {
            position: fixed;
            top: -50px;
            z-index: -1;
            pointer-events: none;
            user-select: none;
            animation: rainFall linear forwards;
        }
        @keyframes rainFall {
            to { transform: translateY(105vh) rotate(360deg); }
        }

        /* الحاوية الأساسية لتنظيم المحتوى بشكل مثالي ومتجاوب تماماً */
        .page-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1;
        }

        /* البطاقات الفاخرة (Container & MC-Section) */
        .card-box {
            border: 1px solid var(--card-border);
            padding: 28px 22px;
            border-radius: 24px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 30px rgba(37, 99, 235, 0.1);
            text-align: center;
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* صورة الحساب مع إطار زجاجي متوهج */
        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 18px;
        }

        .avatar-glow-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--success));
            background-size: 300% 300%;
            animation: borderRotate 5s linear infinite;
            z-index: 0;
            filter: blur(4px);
            opacity: 0.8;
        }

        @keyframes borderRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .custom-img {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50% !important;
            border: 3px solid var(--dark);
            object-fit: cover !important;
            z-index: 1;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transition: transform 0.35s ease;
        }

        .custom-img:hover {
            transform: scale(1.06);
        }

        h1 {
            color: var(--text-main);
            font-size: 1.8em;
            font-weight: 900;
            margin: 8px 0 4px;
            background: linear-gradient(135deg, #FFFFFF, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-box p {
            color: var(--text-muted);
            font-size: 0.98em;
            margin-bottom: 22px;
            font-weight: 500;
        }

        /* الأزرار الاحترافية */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 15px 20px;
            margin: 10px 0;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.05em;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn i {
            font-size: 1.25em;
            transition: transform 0.3s ease;
        }

        .btn:hover i {
            transform: scale(1.15) rotate(5deg);
        }

        .btn:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.07);
        }

        /* ألوان التفاعل للمنصات */
        .btn-youtube:hover { border-color: #ff0000; box-shadow: 0 8px 25px rgba(255, 0, 0, 0.3); color: #ff5555; }
        .btn-tiktok:hover { border-color: #ff0050; box-shadow: 0 8px 25px rgba(255, 0, 80, 0.3); color: #ff3377; }
        .btn-facebook:hover { border-color: #1877f2; box-shadow: 0 8px 25px rgba(24, 119, 242, 0.3); color: #4499ff; }
        .btn-instagram:hover { border-color: #e1306c; box-shadow: 0 8px 25px rgba(225, 48, 108, 0.3); color: #ff5599; }
        .btn-discord:hover { border-color: #5865f2; box-shadow: 0 8px 25px rgba(88, 101, 242, 0.3); color: #7788ff; }
        .btn-kick:hover { border-color: #53fc18; box-shadow: 0 8px 25px rgba(83, 252, 24, 0.3); color: #77ff44; }
        .btn-share:hover { border-color: var(--warning); box-shadow: 0 8px 25px rgba(245, 158, 11, 0.3); color: var(--warning); }

        /* قسم ماين كرافت بطاقات الألعاب */
        .mc-section {
            border-color: rgba(34, 197, 94, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 30px rgba(34, 197, 94, 0.1);
        }

        .mc-section h2 {
            color: var(--success);
            margin: 0 0 18px 0;
            font-size: 1.5em;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .mc-btn {
            background: var(--card-bg);
            color: var(--text-main);
            padding: 16px 12px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.05em;
            border: 1px solid rgba(34, 197, 94, 0.25);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .mc-btn i {
            font-size: 1.7em;
            color: var(--success);
            transition: transform 0.3s ease;
        }

        .mc-btn span {
            font-size: 0.8em;
            color: var(--text-muted);
            font-weight: 400;
        }

        .mc-btn:hover {
            background: var(--success);
            color: var(--dark);
            border-color: var(--success);
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(34, 197, 94, 0.35);
        }

        .mc-btn:hover i, .mc-btn:hover span {
            color: var(--dark);
        }

        .mc-btn:hover i {
            transform: scale(1.15) rotate(6deg);
        }

        /* الفوتر وشريط العدّاد */
        .site-footer {
            width: 100%;
            text-align: center;
            padding: 10px 0 30px;
            color: var(--text-muted);
            font-size: 0.88em;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .visitor-counter {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--card-border);
            padding: 8px 18px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            color: var(--text-main);
        }
        .visitor-counter i {
            color: var(--warning);
        }

        .back-to-top {
            position: fixed;
            bottom: 25px;
            left: 25px;
            width: 44px;
            height: 44px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 998;
        }
        .back-to-top.show {
            opacity: 1;
            visibility: visible;
        }
        .back-to-top:hover {
            transform: translateY(-4px);
            background: var(--secondary);
        }

        /* إشعار النسخ Toast */
        #copy-toast {
            visibility: hidden;
            background: var(--warning);
            color: #000000;
            text-align: center;
            border-radius: 12px;
            padding: 14px 24px;
            position: fixed;
            bottom: 25px;
            z-index: 10000;
            font-weight: 800;
            box-shadow: 0 12px 30px rgba(245, 158, 11, 0.4);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        #copy-toast.show {
            visibility: visible;
            transform: translateY(0);
            opacity: 1;
        }

        /* تحسين العرض على أجهزة الكمبيوتر والشاشات الكبيرة (Desktop Viewport) */
        @media (min-width: 850px) {
            body {
                padding: 40px 20px;
            }
            .page-container {
                max-width: 520px;
                gap: 24px;
            }
            .card-box {
                padding: 35px 30px;
            }
        }

        @media (max-width: 400px) {
            body { padding: 15px 10px; }
            .card-box { padding: 22px 16px; }
            h1 { font-size: 1.6em; }
        }
    </style>
</head>
<body>

    <!-- مؤشر تحميل الصفحة -->
    <div id="page-loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">MORTADHA ALI</div>
    </div>

    <!-- الخلفيات المتحركة -->
    <div class="ambient-background"></div>
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>

    <!-- حاوية الصفحة المتجاوبة -->
    <div class="page-container">

        <!-- البطاقة الرئيسية والهيدر -->
        <div class="card-box">
            <div class="avatar-container">
                <div class="avatar-glow-ring"></div>
                <img src="logo2.png" alt="Mortadha Ali" class="custom-img" loading="lazy">
            </div>
            <h1>مرتضى علي</h1>
            <p>الموقع الرسمي لمرتضى علي</p>
            
            <a href="https://www.youtube.com/channel/UC0eoyZZM8IjplSyoaFmZJFA" class="btn btn-youtube" target="_blank"><i class="fab fa-youtube"></i> يوتيوب</a>
            <a href="https://www.tiktok.com/@mortadhaali313" class="btn btn-tiktok" target="_blank"><i class="fab fa-tiktok"></i> تيك توك</a>
            <a href="https://web.facebook.com/mortadha.ali2" class="btn btn-facebook" target="_blank"><i class="fab fa-facebook"></i> فيسبوك</a>
            <a href="https://www.instagram.com/mortadha_ali12/" class="btn btn-instagram" target="_blank"><i class="fab fa-instagram"></i> إنستكرام</a>
            <a href="https://discord.gg/qFWsBe4udR" class="btn btn-discord" target="_blank"><i class="fab fa-discord"></i> دسكورد</a>
            <a href="https://kick.com/mortadha-ali" class="btn btn-kick" target="_blank"><i class="fas fa-gamepad"></i> كيك (Kick)</a>
            
            <button onclick="copyLink()" class="btn btn-share"><i class="fas fa-share-alt"></i> مشاركة الموقع</button>
        </div>

        <!-- قسم ماين كرافت كبطاقات ألعاب حديثة -->
        <div class="card-box mc-section">
            <h2><i class="fas fa-cube"></i> قسم ماين كرافت ⛏️</h2>
            <div class="grid-container">
                <a href="mods.html" class="mc-btn">
                    <i class="fas fa-puzzle-piece"></i>
                    مودات
                    <span>إضافات حصرية</span>
                </a>
                <a href="skins.html" class="mc-btn">
                    <i class="fas fa-user-ninja"></i>
                    سكنات
                    <span>أروع السكنات</span>
                </a>
                <a href="worlds.html" class="mc-btn">
                    <i class="fas fa-globe-americas"></i>
                    عوالم
                    <span>خرائط مذهلة</span>
                </a>
                <a href="servers.html" class="mc-btn">
                    <i class="fas fa-server"></i>
                    سيرفرات
                    <span>أقوى السيرفرات</span>
                </a>
            </div>
        </div>

        <!-- الفوتر -->
        <footer class="site-footer">
            <div class="visitor-counter">
                <i class="fas fa-eye"></i>
                <span>الزوار النشطون اليوم: <strong id="visitor-count">1,482</strong></span>
            </div>
            <p>&copy; 2026 Mortadha Ali. جميع الحقوق محفوظة.</p>
        </footer>

    </div>

    <!-- زر العودة للأعلى -->
    <button class="back-to-top" id="backToTopBtn" onclick="scrollToTop()" aria-label="العودة للأعلى">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- شاشة إشعار النسخ (Toast) -->
    <div id="copy-toast">تم نسخ رابط الموقع بنجاح!</div>

    <script>
        // إخفاء مؤشر التحميل عند اكتمال تحميل الصفحة
        window.addEventListener('load', () => {
            const loader = document.getElementById('page-loader');
            setTimeout(() => {
                loader.classList.add('loaded');
            }, 300);
        });

        // دالة نسخ الرابط مع Toast احترافي
        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            var x = document.getElementById("copy-toast");
            x.className = "show";
            setTimeout(function(){ 
                x.className = x.className.replace("show", ""); 
            }, 3000);
        }

        // إظهار وإخفاء زر العودة للأعلى
        const backToTopBtn = document.getElementById('backToTopBtn');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 250) {
                backToTopBtn.classList.add('show');
            } else {
                backToTopBtn.classList.remove('show');
            }
        }, { passive: true });

        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        // مطر الإيموجي السلس والموزون
        function createEmojiRain() {
            const emojis = ['🎮', '⛏️', '🕹️', '👾', '🔥', '💎', '🚀', '⚡', '⚔️', '🛡️', '🌍', '✨', '🏆', '🎯', '📦'];
            const emoji = document.createElement('div');
            emoji.className = 'emoji-rain';
            emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 100 + 'vw';
            emoji.style.fontSize = (Math.random() * 14 + 14) + 'px';
            emoji.style.animationDuration = (Math.random() * 3 + 3) + 's';
            emoji.style.opacity = Math.random() * 0.35 + 0.15;
            document.body.appendChild(emoji);
            setTimeout(() => { emoji.remove(); }, 6000);
        }
        setInterval(createEmojiRain, 450);
    </script>
</body>
</html>
