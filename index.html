<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Mortadha Ali | مرتضى علي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* تأثير الماء المتساقط (Liquid Flow Effect) */
        body { 
            background: linear-gradient(180deg, #000000, #1a1500, #4d3d00, #000000);
            background-size: 100% 400%;
            animation: liquidFlow 10s ease infinite;
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            scroll-behavior: smooth; 
        }
        @keyframes liquidFlow {
            0% { background-position: 0% 0%; }
            50% { background-position: 0% 100%; }
            100% { background-position: 0% 0%; }
        }
        
        .container, .mc-section { animation: fadeIn 0.8s ease-in-out; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .pulse-btn { animation: pulse 2s infinite !important; border: 2px solid #ffd700 !important; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px #ffd700; }
            50% { transform: scale(1.05); box-shadow: 0 0 20px #ffd700; }
            100% { transform: scale(1); box-shadow: 0 0 10px #ffd700; }
        }

        .container { border: 1px solid #ffd700; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; text-align: center; margin-bottom: 40px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .custom-img { width: 150px; height: 150px; border-radius: 50%; border: 3px solid #ffd700; box-shadow: 0 0 20px #ffd700; margin-bottom: 20px; }
        h1 { color: #ffd700; font-size: 2em; margin-bottom: 10px; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        
        .btn, .mc-btn { transition: 0.3s; }
        .btn:active, .mc-btn:active { transform: scale(0.95); }
        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(255, 255, 255, 0.05); border: 1px solid #ffd700; color: white; padding: 12px; margin: 10px 0; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .btn:hover { background: #ffd700; color: #000; box-shadow: 0 0 20px #ffd700; }
        
        .mc-section { width: 90%; max-width: 500px; border: 1px solid #ffd700; padding: 20px; border-radius: 20px; text-align: center; }
        .mc-header { color: #ffd700; font-size: 1.8em; margin-bottom: 20px; border-bottom: 1px solid #ffd700; padding-bottom: 10px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .mc-btn { background: rgba(255, 255, 255, 0.05); color: #fff; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; border: 1px solid #ffd700; }
        .mc-btn:hover { background: #ffd700; color: #000; box-shadow: 0 0 20px #ffd700; }

        .top-btn { position: fixed; bottom: 20px; right: 20px; background: #ffd700; color: black; padding: 10px 15px; border-radius: 50%; cursor: pointer; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

        <a href="https://www.tiktok.com/@mortadhaali313" class="btn"><i class="fab fa-tiktok"></i> تيك توك</a>
        <a href="https://web.facebook.com/mortadha.ali2" class="btn"><i class="fab fa-facebook"></i> فيسبوك</a>
        <a href="https://www.instagram.com/mortadha_ali12/" class="btn"><i class="fab fa-instagram"></i> إنستكرام</a>
        <a href="https://discord.gg/qFWsBe4udR" class="btn"><i class="fab fa-discord"></i> دسكورد</a>
        <a href="https://kick.com/mortadha-ali" class="btn"><i class="fas fa-gamepad"></i> كيك (Kick)</a>
    </div>

    <div class="mc-section">
        <h2 class="mc-header">قسم ماين كرافت ⛏️</h2>
        <div class="grid-container">
            <a href="mods.html" class="mc-btn">مودات</a>
