<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Mortadha Ali | مرتضى علي</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        /* الواجهة الأصلية */
        .container { border: 2px solid #ff9800; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; background: rgba(0, 0, 0, 0.8); box-shadow: 0 0 20px #ff9800; text-align: center; margin-bottom: 40px; }
        .custom-img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #ff9800; box-shadow: 0 0 15px #ff9800, 0 0 25px #2196f3; margin-bottom: 20px; }
        h1 { color: #ff9800; text-shadow: 0 0 10px #ff9800; font-size: 2em; margin-bottom: 10px; }
        .desc { color: #fff; margin-bottom: 20px; font-weight: bold; }
        .btn { display: block; background: #2196f3; color: white; padding: 12px; margin: 10px 0; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        
        /* تصميم قسم ماين كرافت الجديد */
        .mc-section { width: 90%; max-width: 500px; background: #1a1a1a; border: 2px solid #4caf50; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 0 15px #4caf50; }
        .mc-header { color: #4caf50; font-size: 1.8em; margin-bottom: 20px; border-bottom: 2px solid #4caf50; padding-bottom: 10px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .mc-btn { background: #333; color: #fff; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; border: 1px solid #4caf50; transition: 0.3s; }
        .mc-btn:hover { background: #4caf50; color: #000; }
    </style>
</head>
<body>

    <!-- الواجهة الأصلية -->
    <div class="container">
        <img src="logo.png" alt="Mortadha Ali" class="custom-img">
        <h1>مرتضى علي</h1>
        <p class="desc">أهلاً بكم في الموقع الرسمي لمرتضى علي</p>
        <a href="https://www.youtube.com/..." class="btn">يوتيوب</a>
        <a href="https://www.tiktok.com/..." class="btn">تيك توك</a>
        <a href="https://web.facebook.com/..." class="btn">فيسبوك</a>
        <a href="https://www.instagram.com/..." class="btn">إنستكرام</a>
        <a href="https://kick.com/..." class="btn">كيك (Kick)</a>
    </div>

    <!-- قسم ماين كرافت الجديد -->
    <div class="mc-section">
        <h2 class="mc-header">قسم ماين كرافت ⛏️</h2>
        <div class="grid-container">
            <a href="mods.html" class="mc-btn">مودات</a>
            <a href="skins.html" class="mc-btn">سكنات</a>
            <a href="worlds.html" class="mc-btn">عوالم</a>
            <a href="servers.html" class="mc-btn">سيرفرات</a>
        </div>
    </div>

</body>
</html>
