<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { border: 2px solid #ff9800; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; background: rgba(0, 0, 0, 0.8); box-shadow: 0 0 20px #ff9800; }
        
        .custom-img {
            width: 150px; 
            height: 150px;
            border-radius: 50%;
            border: 4px solid #ff9800;
            box-shadow: 0 0 15px #ff9800, 0 0 25px #2196f3;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        
        h1 { color: #ff9800; font-size: 2em; margin-bottom: 20px; }
        .btn { display: block; background: #2196f3; color: white; padding: 12px; margin: 10px 0; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .btn:hover { background: #1565c0; }
    </style>
</head>
<body>
    <div class="container">
        <!-- تم تعديل اسم الصورة هنا ليكون مطابقاً تماماً لما أرسلته -->
        <img src="my_logo.png" alt="Mortadha Ali" class="custom-img">
        
        <h1>MORTADHA ALI</h1>
        
        <a href="https://www.youtube.com/channel/UC0eoyZZM8IjplSyoaFmZJFA" class="btn">يوتيوب</a>
        <a href="https://www.tiktok.com/@mortadhaali313" class="btn">تيك توك</a>
        <a href="https://web.facebook.com/mortadha.ali2" class="btn">فيسبوك</a>
        <a href="https://www.instagram.com/mortadha_ali12/" class="btn">إنستكرام</a>
        <a href="https://kick.com/mortadha-ali" class="btn">كيك (Kick)</a>
    </div>
</body>
</html>
