<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Mortadha Ali | مرتضى علي</title>
    <!-- الأيقونة -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968601.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #000000, #1a1a1a, #000000); 
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; 
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { border: 2px solid #ff9800; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; background: rgba(0, 0, 0, 0.8); box-shadow: 0 0 20px #ff9800; text-align: center; margin-bottom: 20px; }
        .custom-img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #ff9800; box-shadow: 0 0 15px #ff9800; margin-bottom: 20px; }
        
        /* تأثير 3D Hover */
        .btn { 
            display: block; padding: 15px; margin: 10px 0; border: 1px solid #ff9800;
            color: #fff; text-decoration: none; border-radius: 10px; transition: 0.3s;
            background: #222; font-weight: bold; cursor: pointer; width: 100%;
        }
        .btn:hover { background: #ff9800; color: #000; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255,152,0,0.3); }

        #toast { visibility: hidden; min-width: 250px; background: #333; color: #ff9800; text-align: center; border-radius: 8px; padding: 16px; position: fixed; bottom: 30px; border: 1px solid #ff9800; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Mortadha Ali" class="custom-img">
        <h1>مرتضى علي</h1>
        
        <a href="https://www.youtube.com/channel/UC0eoyZZM8IjplSyoaFmZJFA" class="btn"><i class="fab fa-youtube"></i> يوتيوب</a>
        <a href="https://www.tiktok.com/@mortadhaali313" class="btn"><i class="fab fa-tiktok"></i> تيك توك</a>
        <button onclick="copyLink()" class="btn"><i class="fas fa-share-alt"></i> مشاركة الموقع</button>
    </div>

    <div id="toast">تم نسخ الرابط!</div>

    <script>
        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            var x = document.getElementById("toast");
            x.style.visibility = "visible";
            setTimeout(function(){ x.style.visibility = "hidden"; }, 3000);
        }
    </script>
</body>
</html>
