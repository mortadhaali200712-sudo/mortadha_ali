<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 50px;
        }
        h1 {
            color: #ff9800; /* لون برتقالي شعارك */
            text-shadow: 0 0 10px #ff9800, 0 0 20px #2196f3; /* إضاءة برتقالية وزرقاء */
            font-size: 3em;
        }
        .container {
            border: 2px solid #ff9800;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
        }
        a {
            color: #2196f3; /* لون أزرق شعارك */
            font-size: 1.5em;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MORTADHA ALI</h1>
        <p>صانع محتوى عراقي | جيمنج</p>
        <br>
        <a href="#">اشترك في قناتي</a>
    </div>
</body>
</html>
