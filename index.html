<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Mortadha Ali | مرتضى علي</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968601.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --bg: #000; --text: #fff; --card: rgba(0,0,0,0.8); --gold: #ff9800; --mc: #4caf50; }
        .light-mode { --bg: #f4f4f4; --text: #000; --card: #fff; }

        body { 
            background: linear-gradient(135deg, var(--bg), #1a1a1a, var(--bg)); 
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; 
            color: var(--text); font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; transition: 0.5s;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .theme-toggle { position: fixed; top: 20px; left: 20px; cursor: pointer; font-size: 20px; color: var(--gold); border: 1px solid var(--gold); padding: 10px; border-radius: 50%; background: var(--card); }

        .container { border: 2px solid var(--gold); padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; background: var(--card); box-shadow: 0 0 20px var(--gold); text-align: center; margin-bottom: 40px; transition: 0.3s; }
        .custom-img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--gold); box-shadow: 0 0 15px var(--gold); margin-bottom: 20px; }
        
        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: #222; border: 1px solid #555; color: var(--text); padding: 12px; margin: 10px 0; text-decoration: none; border-radius: 8px; font-weight: bold; width: 100%; box-sizing: border-box; cursor: pointer; }
        .btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }
        
        .mc-section { width: 90%; max-width: 500px; background: var(--card); border: 2px solid var(--mc); padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 0 15px var(--mc); }
        .mc-header { color: var(--mc); font-size: 1.8em; margin-bottom: 20px; border-bottom: 2px solid var(--mc); padding-bottom: 10px; }
        .mc-btn { background: #333; color: #fff; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; border: 1px solid var(--mc); }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        #copy-toast { visibility: hidden; min-width: 250px; background: #111; color: var(--gold); text-align: center; border-radius: 8px; padding: 15px; position: fixed; bottom: 30px; border: 1px solid var(--gold); z-index: 1000; }
    </style>
</head>
<body>

    <div class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-adjust"></i></div>

    <div class="container">
        <img src="logo.png" alt="Mortadha Ali" class="custom-img">
        <h1>مرتضى علي</h1>
        <p>أهلاً بكم في الموقع الرسمي لمرتضى علي</p>
        <a href="https://www.youtube.com/channel/UC0eoyZZM8IjplSyoaFmZJFA" class="btn"><i class="fab fa-youtube" style="color:red;"></i> يوتيوب</a>
        <a href="https://www.tiktok.com/@mortadhaali313" class="btn"><i class="fab fa-tiktok"></i> تيك توك</a>
        <button onclick="copyLink()" class="btn"><i class="fas fa-share-alt"></i> مشاركة الموقع</button>
    </div>

    <div class="mc-section">
        <h2 class="mc-header">قسم ماين كرافت ⛏️</h2>
        <div class="grid-container">
            <a href="mods.html" class="mc-btn">مودات</a>
            <a href="skins.html" class="mc-btn">سكنات</a>
            <a href="worlds.html" class="mc-btn">عوالم</a>
            <a href="servers.html" class="mc-btn">سيرفرات</a>
        </div>
    </div>

    <div id="copy-toast">تم نسخ رابط الموقع بنجاح!</div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle("light-mode");
        }
        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            var x = document.getElementById("copy-toast");
            x.style.visibility = "visible";
            setTimeout(function(){ x.style.visibility = "hidden"; }, 3000);
        }
    </script>
</body>
</html>
