<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortadha Ali | مرتضى علي</title>
    <link rel="icon" href="logo2.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #000000, #1a1a1a, #000000); 
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
            color: #fff; font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 15px; 
            overflow-x: hidden;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .container { border: 2px solid #ff9800; padding: 20px; border-radius: 20px; width: 100%; max-width: 450px; background: rgba(0, 0, 0, 0.8); box-shadow: 0 0 20px #ff9800; text-align: center; margin-bottom: 20px; box-sizing: border-box; z-index: 1; }
        
        .custom-img { width: 120px; height: 120px; border-radius: 50% !important; border: 4px solid #ff9800; box-shadow: 0 0 20px #ff9800; margin-bottom: 15px; object-fit: cover !important; }
        
        h1 { color: #ff9800; font-size: 1.5em; margin: 10px 0; }
        
        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: #222; border: 1px solid #555; color: white; padding: 15px; margin: 8px 0; text-decoration: none; border-radius: 12px; font-weight: bold; width: 100%; box-sizing: border-box; transition: 0.3s; cursor: pointer; }
        .btn:hover { background: #333; border-color: #ff9800; }
        
        .mc-section { width: 100%; max-width: 450px; background: #1a1a1a; border: 2px solid #4caf50; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 0 15px #4caf50; margin-bottom: 20px; box-sizing: border-box; z-index: 1; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .mc-btn { background: #333; color: #fff; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; border: 1px solid #4caf50; transition: 0.3s; }
        .mc-btn:hover { background: #4caf50; color: #000; }

        /* ستايل المطر */
        .emoji-rain { position: fixed; top: -50px; z-index: 0; pointer-events: none; user-select: none; animation: rain linear forwards; }
        @keyframes rain { to { transform: translateY(100vh); } }

        #copy-toast { visibility: hidden; background: #ff9800; color: black; text-align: center; border-radius: 8px; padding: 15px; position: fixed; bottom: 30px; z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo2.png" alt="Mortadha Ali" class="custom-img">
        <h1>مرتضى علي</h1>
        <p>الموقع الرسمي لمرتضى علي</p>
        
        <a href="https://www.youtube.com/channel/UC0eoyZZM8IjplSyoaFmZJFA" class="btn"><i class="fab fa-youtube" style="color:red;"></i> يوتيوب</a>
        <a href="https://www.tiktok.com/@mortadhaali313" class="btn"><i class="fab fa-tiktok"></i> تيك توك</a>
        <a href="https://web.facebook.com/mortadha.ali2" class="btn"><i class="fab fa-facebook" style="color:#1877f2;"></i> فيسبوك</a>
        <a href="https://www.instagram.com/mortadha_ali12/" class="btn"><i class="fab fa-instagram" style="color:#e1306c;"></i> إنستكرام</a>
        <a href="https://discord.gg/qFWsBe4udR" class="btn"><i class="fab fa-discord" style="color:#5865f2;"></i> دسكورد</a>
        <a href="https://kick.com/mortadha-ali" class="btn"><i class="fas fa-gamepad" style="color:#53fc18;"></i> كيك (Kick)</a>
        
        <button onclick="copyLink()" class="btn" style="border: 1px solid #ff9800;"><i class="fas fa-share-alt"></i> مشاركة الموقع</button>
    </div>

    <div class="mc-section">
        <h2 style="color: #4caf50; margin: 0; font-size: 1.5em;">قسم ماين كرافت ⛏️</h2>
        <div class="grid-container">
            <a href="mods.html" class="mc-btn">مودات</a>
            <a href="skins.html" class="mc-btn">سكنات</a>
            <a href="worlds.html" class="mc-btn">عوالم</a>
            <a href="servers.html" class="mc-btn">سيرفرات</a>
        </div>
    </div>

    <div id="copy-toast">تم نسخ رابط الموقع بنجاح!</div>

    <script>
        // دالة نسخ الرابط
        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            var x = document.getElementById("copy-toast");
            x.style.visibility = "visible";
            setTimeout(function(){ x.style.visibility = "hidden"; }, 3000);
        }

        // دالة مطر الإيموجيات
        function createEmojiRain() {
            const emojis = ['🎮', '⛏️', '🕹️', '👾', '🔥', '💎', '🚀', '⚡', '💣', '⚔️', '🛡️', '🌍', '🧟', '✨', '🏆', '🎯', '📦'];
            const emoji = document.createElement('div');
            emoji.className = 'emoji-rain';
            emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 100 + 'vw';
            emoji.style.fontSize = (Math.random() * 20 + 15) + 'px';
            emoji.style.animationDuration = (Math.random() * 3 + 2) + 's';
            emoji.style.opacity = Math.random() * 0.7 + 0.3;
            document.body.appendChild(emoji);
            setTimeout(() => { emoji.remove(); }, 5000);
        }
        setInterval(createEmojiRain, 150);
    </script>
</body>
</html>
