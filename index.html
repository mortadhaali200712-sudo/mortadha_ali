    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #000000, #1a1a1a, #000000); 
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
            color: #fff; font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 15px; 
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .container { border: 2px solid #ff9800; padding: 20px; border-radius: 20px; width: 100%; max-width: 450px; background: rgba(0, 0, 0, 0.8); box-shadow: 0 0 20px #ff9800; text-align: center; margin-bottom: 20px; box-sizing: border-box; }
        
        .custom-img { width: 120px; height: 120px; border-radius: 50% !important; border: 4px solid #ff9800; box-shadow: 0 0 20px #ff9800; margin-bottom: 15px; object-fit: cover !important; }
        
        h1 { color: #ff9800; font-size: 1.5em; margin: 10px 0; }
        
        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: #222; border: 1px solid #555; color: white; padding: 15px; margin: 8px 0; text-decoration: none; border-radius: 12px; font-weight: bold; width: 100%; box-sizing: border-box; transition: 0.3s; }
        .btn:hover { background: #333; border-color: #ff9800; }
        
        .mc-section { width: 100%; max-width: 450px; background: #1a1a1a; border: 2px solid #4caf50; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 0 15px #4caf50; margin-bottom: 20px; box-sizing: border-box; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .mc-btn { background: #333; color: #fff; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; border: 1px solid #4caf50; transition: 0.3s; }
        .mc-btn:hover { background: #4caf50; color: #000; }

        .pulse-btn { animation: pulse 2s infinite !important; border: 2px solid red !important; }
        @keyframes pulse { 0% { transform: scale(1); } 70% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

        <a href="https://www.instagram.com/mortadha_ali12/" class="btn"><i class="fab fa-instagram" style="color:#e1306c;"></i> إنستكرام</a>
        <!-- الروابط التي طلبتها -->
        <a href="https://discord.gg/qFWsBe4udR" class="btn"><i class="fab fa-discord" style="color:#5865f2;"></i> دسكورد</a>
        <a href="https://kick.com/mortadha-ali" class="btn"><i class="fas fa-gamepad" style="color:#53fc18;"></i> كيك (Kick)</a>
