<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرتضى علي - Mortadha Ali | الموقع الرسمي</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; min-height: 100vh; margin: 0; }
        .container { border: 2px solid #ff9800; padding: 20px; border-radius: 20px; width: 90%; max-width: 500px; background: rgba(0, 0, 0, 0.8); box-shadow: 0 0 20px #ff9800; margin: auto; }
        .custom-img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #ff9800; margin-bottom: 15px; }
        h1 { color: #ff9800; font-size: 1.8em; margin-bottom: 10px; }
        .btn { display: block; background: #2196f3; color: white; padding: 10px; margin: 8px 0; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; border: none; width: 100%; cursor: pointer; }
        .section-btn { background: #ff9800; color: #000; }
        
        /* تصميم الأقسام (المودات، العوالم، إلخ) */
        .content-box { display: none; background: #111; padding: 15px; border-radius: 10px; margin-top: 5px; border: 1px solid #ff9800; text-align: right; }
        .search-bar { width: 95%; padding: 8px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #555; background: #000; color: #fff; }
        .item { border-bottom: 1px solid #333; padding: 8px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Mortadha Ali" class="custom-img">
        <h1>مرتضى علي</h1>
        
        <button class="btn section-btn" onclick="toggle('mods')">مودات ماين كرافت</button>
        <div id="mods" class="content-box">
            <input type="text" class="search-bar" onkeyup="filter('modsList', this.value)" placeholder="🔍 ابحث عن مود...">
            <div id="modsList">
                <div class="item"><span>مود الأسلحة</span><a href="#" style="color:#2196f3">تحميل</a></div>
                <div class="item"><span>مود السيارات</span><a href="#" style="color:#2196f3">تحميل</a></div>
            </div>
        </div>

        <button class="btn section-btn" onclick="toggle('worlds')">عوالم ماين كرافت</button>
        <div id="worlds" class="content-box">
            <input type="text" class="search-bar" onkeyup="filter('worldsList', this.value)" placeholder="🔍 ابحث عن عالم...">
            <div id="worldsList">
                <div class="item"><span>عالم النجاة</span><a href="#" style="color:#2196f3">تحميل</a></div>
            </div>
        </div>

        <button class="btn section-btn" onclick="toggle('servers')">سيرفرات ماين كرافت</button>
        <div id="servers" class="content-box">
            <div class="item"><span>IP: play.server.com</span></div>
        </div>

        <button class="btn section-btn" onclick="toggle('skins')">سكنات ماين كرافت</button>
        <div id="skins" class="content-box">
            <div class="item"><span>سكن مرتضى علي</span><a href="#" style="color:#2196f3">تحميل</a></div>
        </div>

        <hr style="margin: 20px 0;">

        <a href="https://www.youtube.com/channel/UC0eoyZZM8IjplSyoaFmZJFA" class="btn">يوتيوب</a>
        <a href="https://www.tiktok.com/@mortadhaali313" class="btn">تيك توك</a>
    </div>

    <script>
        function toggle(id) {
            var x = document.getElementById(id);
            x.style.display = (x.style.display === "block") ? "none" : "block";
        }
        function filter(listId, query) {
            let list = document.getElementById(listId);
            let items = list.getElementsByClassName('item');
            for (let i = 0; i < items.length; i++) {
                items[i].style.display = items[i].innerText.toLowerCase().includes(query.toLowerCase()) ? "" : "none";
            }
        }
    </script>
</body>
</html>
