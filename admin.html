<!DOCTYPE html>
<html lang="ar" dir="rtl">
<body>
    <h1>لوحة التحكم</h1>
    <div id="admin-chat"></div>

    <script type="module">
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
        // ... (ضع هنا كود إعدادات Firebase الذي استخدمته سابقاً) ...

        const db = getDatabase(app);

        onValue(ref(db, 'messages/'), (snapshot) => {
            const chat = document.getElementById("admin-chat");
            chat.innerHTML = "";
            snapshot.forEach((child) => {
                const data = child.val();
                const key = child.key;
                chat.innerHTML += `
                    <p><strong>الزائر:</strong> ${data.text}</p>
                    <p><strong>ردك:</strong> ${data.reply || "لا يوجد رد"}</p>
                    <input type="text" id="reply-${key}" placeholder="اكتب ردك هنا">
                    <button onclick="sendReply('${key}')">إرسال الرد</button>
                    <hr>`;
            });
        });

        window.sendReply = (key) => {
            const replyText = document.getElementById(`reply-${key}`).value;
            update(ref(db, 'messages/' + key), { reply: replyText });
        };
    </script>
</body>
</html>
