<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تكت خاص</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #1a1a1a; color: #fff; padding: 20px; font-family: sans-serif; }
        #chat { height: 300px; border: 1px solid #555; overflow-y: scroll; padding: 10px; background: #000; }
        .msg { margin: 5px 0; padding: 5px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <h2 id="title">غرفة التكت</h2>
    <div id="chat"></div>
    <input type="text" id="msg" placeholder="اكتب رسالتك هنا...">
    <button onclick="send()">إرسال</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCeuQF67GtK8JWBAEo9zKHM-RxLVeAhgcs",
            authDomain: "murtadaserver-bbe52.firebaseapp.com",
            databaseURL: "https://murtadaserver-bbe52-default-rtdb.firebaseio.com",
            projectId: "murtadaserver-bbe52",
            storageBucket: "murtadaserver-bbe52.firebasestorage.app",
            messagingSenderId: "816833804949",
            appId: "1:816833804949:web:c4793ec95fa69ea44c399c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // معرفة رقم التكت من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const ticketId = urlParams.get('id');
        const userName = urlParams.get('name');
        document.getElementById('title').innerText = "تكت خاص لـ: " + userName;

        function send() {
            const txt = document.getElementById('msg').value;
            db.ref('tickets/' + ticketId + '/messages/').push({
                sender: userName,
                text: txt
            });
            document.getElementById('msg').value = "";
        }

        db.ref('tickets/' + ticketId + '/messages/').on('value', snap => {
            const chat = document.getElementById('chat');
            chat.innerHTML = "";
            snap.forEach(s => {
                chat.innerHTML += `<div class="msg"><b>${s.val().sender}:</b> ${s.val().text}</div>`;
            });
        });
    </script>
</body>
</html>
