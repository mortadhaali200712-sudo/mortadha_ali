<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شات التكت | سيرفر مرتضى</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* ستايل مستوحى من ديسكورد */
        body { 
            background-color: #313338; /* لون خلفية ديسكورد */
            color: #dbdee1; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; 
            height: 100vh; 
        }
        
        /* الشريط العلوي */
        .header { 
            background-color: #2b2d31; 
            padding: 15px 20px; 
            display: flex; align-items: center; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.2); 
            border-bottom: 1px solid #1e1f22;
        }
        .header h3 { margin: 0; color: #f2f3f5; font-size: 18px; }
        .back-btn { background: #4f545c; color: white; text-decoration: none; padding: 6px 15px; border-radius: 4px; margin-left: 15px; font-weight: bold; transition: 0.2s;}
        .back-btn:hover { background: #5d6269; }

        /* منطقة الرسائل */
        .chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; flex-direction: column; gap: 20px; 
        }
        
        /* تصميم الرسالة */
        .message { display: flex; gap: 15px; align-items: flex-start; }
        .avatar { 
            width: 40px; height: 40px; 
            background-color: #5865F2; /* لون أزرار ديسكورد */
            border-radius: 50%; display: flex; justify-content: center; 
            align-items: center; color: white; font-weight: bold; font-size: 18px; flex-shrink: 0;
        }
        .msg-content { display: flex; flex-direction: column; }
        .username { font-weight: bold; color: #f2f3f5; font-size: 16px; margin-bottom: 5px; }
        .time { font-size: 12px; color: #949ba4; margin-right: 10px; font-weight: normal; }
        .text { font-size: 15px; line-height: 1.5; color: #dbdee1; }

        /* منطقة الكتابة (الأسفل) */
        .input-area { background-color: #313338; padding: 15px 20px 20px 20px; }
        .input-box { 
            background-color: #383a40; 
            border-radius: 8px; display: flex; padding: 10px 15px; align-items: center; 
        }
        .input-box input { 
            flex: 1; background: transparent; border: none; color: #dbdee1; 
            font-size: 15px; outline: none; padding: 0 10px; 
        }
        .input-box input::placeholder { color: #949ba4; }
        .send-btn { 
            background-color: #5865F2; color: white; border: none; 
            padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; 
        }
        .send-btn:hover { background-color: #4752c4; }
    </style>
</head>
<body>

    <!-- الشريط العلوي -->
    <div class="header">
        <a href="servers.html" class="back-btn">مغادرة التكت</a>
        <h3 id="ticket-title">💬 # تكت-عام</h3>
    </div>

    <!-- مكان ظهور الرسائل -->
    <div class="chat-container" id="chatBox">
        <!-- الرسائل ستظهر هنا برمجياً -->
    </div>

    <!-- مربع كتابة الرسالة -->
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="اكتب رسالتك هنا... (اضغط Enter للإرسال)">
            <button class="send-btn" onclick="sendMsg()">إرسال</button>
        </div>
    </div>

    <script>
        // إعدادات قاعدة البيانات
        const firebaseConfig = {
            apiKey: "AIzaSyCeuQF67GtK8JWBAEo9zKHM-RxLVeAhgcs",
            authDomain: "murtadaserver-bbe52.firebaseapp.com",
            databaseURL: "https://murtadaserver-bbe52-default-rtdb.firebaseio.com",
            projectId: "murtadaserver-bbe52",
            storageBucket: "murtadaserver-bbe52.firebasestorage.app",
            messagingSenderId: "816833804949",
            appId: "1:816833804949:web:c4793ec95fa69ea44c399c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // سحب اسم المستخدم ورقم التكت من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const ticketId = urlParams.get('id');
        const userName = urlParams.get('name') || "زائر";
        
        // تغيير عنوان الشات لاسم المستخدم
        document.getElementById('ticket-title').innerText = "💬 # تكت-" + userName;

        // دالة الإرسال
        function sendMsg() {
            const input = document.getElementById('msgInput');
            const txt = input.value.trim();
            if (!txt) return;

            // أخذ الوقت الحالي
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

            // حفظ الرسالة في القاعدة
            db.ref('tickets/' + ticketId + '/messages/').push({
                sender: userName,
                text: txt,
                time: timeStr
            });

            input.value = ""; // تفريغ المربع بعد الإرسال
        }

        // دعم الإرسال بالضغط على زر Enter في الكيبورد
        document.getElementById('msgInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMsg();
        });

        // جلب الرسائل وعرضها بستايل الديسكورد
        db.ref('tickets/' + ticketId + '/messages/').on('value', snap => {
            const chat = document.getElementById('chatBox');
            chat.innerHTML = ""; // مسح الشات القديم
            
            snap.forEach(s => {
                const data = s.val();
                const firstLetter = data.sender.charAt(0).toUpperCase(); // أول حرف للصورة الرمزية
                
                chat.innerHTML += `
                    <div class="message">
                        <div class="avatar">${firstLetter}</div>
                        <div class="msg-content">
                            <div class="username">${data.sender} <span class="time">${data.time || ''}</span></div>
                            <div class="text">${data.text}</div>
                        </div>
                    </div>
                `;
            });
            // النزول التلقائي لأسفل الشات عند وصول رسالة جديدة
            chat.scrollTop = chat.scrollHeight; 
        });
    </script>
</body>
</html>
